name: Quality (PHP)

# Runs on every PR + push to main. Branch protection on main requires this to pass.
# See ticket #11 (0.0.11) for the full quality gates rationale.

on:
  # AUD-061 — blacklist (paths-ignore), not whitelist (paths). The old `paths:`
  # whitelist (apps/api + a few scripts) silently skipped every backend gate
  # (PHPStan / PHPUnit / Deptrac / cs-fixer) on any PR that did not touch
  # apps/api/** — e.g. a PR touching only packages/shared-types/** (which feeds
  # the OpenAPI/TS contract), root composer files, or this workflow itself.
  # That meta-gap let latent PHPStan errors land on main (W1-7 TenantOffboarding-
  # PurgeTest, fixed in W2-1). A whitelist also re-opens the same hole for every
  # *future* backend-relevant directory nobody remembers to add. paths-ignore is
  # fail-safe: the gates run ALWAYS unless a PR touches ONLY pure docs/markdown.
  #
  # docs/api-spec/** is NOT ignored (it is re-included via `!`): the openapi-spec
  # job diffs docs/api-spec/v0.json, so a spec change must still re-trigger.
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "!docs/api-spec/**"
      - "Project Plan/**"
      - "Testy/**"
      - "Zrodla/**"
      - "agent/**"
      - "agent_sample/**"
      - "backups/**"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "!docs/api-spec/**"
      - "Project Plan/**"
      - "Testy/**"
      - "Zrodla/**"
      - "agent/**"
      - "agent_sample/**"
      - "backups/**"

concurrency:
  group: quality-php-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: apps/api

jobs:
  phpstan:
    name: PHPStan max
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, opcache, pcntl, pdo_pgsql, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            apps/api/vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate JWT keypair (lexik bundle requires the files at compile time)
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -aes256 -pass pass:ci -pkeyopt rsa_keygen_bits:4096
          openssl pkey -in config/jwt/private.pem -passin pass:ci -pubout -out config/jwt/public.pem

      - name: Warm up cache (PHPStan needs the dev container.xml)
        run: php bin/console cache:clear --env=dev
        env:
          APP_ENV: dev
          APP_DEBUG: "1"
          DATABASE_URL: postgresql://app:app@localhost:5432/app?serverVersion=16
          MESSENGER_TRANSPORT_DSN: in-memory://
          MERCURE_URL: http://localhost/.well-known/mercure
          MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
          MERCURE_JWT_SECRET: ci-mercure-key-at-least-256-bits-long
          JWT_PASSPHRASE: ci

      - name: PHPStan
        run: composer phpstan
        env:
          APP_ENV: dev
          JWT_PASSPHRASE: ci

  deptrac:
    name: Deptrac (architectural fitness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            apps/api/vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Deptrac analyse
        run: vendor/bin/deptrac analyse --no-progress --no-cache

  raw-sql-lint:
    # HARD-07 — guard-rail for raw SQL bypassing TenantFilter.
    # Cheap shell job; runs before composer install so failures
    # surface in seconds without burning CI minutes.
    name: Raw SQL tenant-safe lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - name: Lint raw SQL escape hatches
        run: bash scripts/lint-raw-sql.sh

  backup-cron-lint:
    # AUD-017 / AUD-021 — guard-rail keeping the pgBackRest backup cron alive.
    # Fails if start-pim.sh stops registering the postgres crontab via
    # `crontab -u` (dcron silently ignores an unregistered per-user file —
    # the bug that killed the cron for ~49 days) or if the Dockerfile schedule
    # drops the full / diff / weekly restore-test entries. Cheap shell job.
    name: Backup cron wiring lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5

      - name: Lint backup cron wiring
        run: bash scripts/lint-backup-cron.sh

  tracked-secrets-lint:
    # AUD-005 / AUD-010 — guard-rail against real secrets committed to VCS.
    # Fails if a non-template `.env.<env>` file is tracked, or if any tracked
    # `.env*` file carries a real (high-entropy / credential-bearing) value.
    # Cheap shell job; complements gitleaks/trufflehog (security-secrets.yml)
    # with a deterministic repo-hygiene assertion. Needs full history so
    # `git ls-files` sees the real tree on push-to-main, not a shallow clone.
    name: Tracked secrets lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Lint tracked env files for real secrets
        run: bash scripts/lint-tracked-secrets.sh

  semgrep-cortex:
    # RBAC-P6-008 / #720 — Cortex-specific Semgrep rules (the static-
    # analysis companion to PHPStan's RequiresPermissionAnnotationRule).
    # Catches plaintext secrets, raw SQL without tenant filter,
    # superglobals, hasRole() bypass of the permission engine, and the
    # same missing #[RequiresPermission] shape PHPStan blocks at PR time.
    # Pre-commit hook locally; CI runs on every PR.
    name: Semgrep (Cortex RBAC rules)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    container:
      # Pin Semgrep — `latest` (>=1.130) broke parser support for the
      # `#[ORM\Entity(...)]` / `#[Route(...)]` PHP attribute patterns
      # used by cortex-entity-missing-tenant-id and
      # cortex-requires-permission-attribute-missing, and rejected the
      # mixed-language array `[yaml, json, php, generic]` on the token
      # rules. Last green run on `main` was 2026-05-22 on a 1.11x image;
      # this pin restores it. Bump together with rule pattern updates
      # when revisiting Semgrep upgrades (#891 follow-up).
      image: semgrep/semgrep:1.116.0
    steps:
      - uses: actions/checkout@v5

      - name: Semgrep scan (.semgrep/cortex-rbac.yml)
        # --severity filters keep CI blocking on ERROR + WARNING rules
        # (real defects) but allow INFO-level rules (heuristics with known
        # false-positives — e.g. cortex-raw-sql-missing-tenant-filter
        # cannot follow tenant_id through FK chains, so junction-table
        # queries trip it). Operators can still see INFO findings by
        # running semgrep locally without the filter; CI surfaces only
        # what is actionable.
        #
        # --strict is intentionally NOT passed: it treats the
        # severity-filtered-out INFO rule as a parse-only-warning and
        # exits non-zero even with 0 findings. --error alone is enough
        # for the intended gate (non-zero exit when blocking findings
        # are reported).
        run: |
          semgrep --config .semgrep/cortex-rbac.yml \
            --error --no-rewrite-rule-ids \
            --severity ERROR --severity WARNING \
            apps/api/src apps/admin/src

  php-cs-fixer:
    name: PHP-CS-Fixer (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            apps/api/vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP-CS-Fixer
        run: composer cs-check

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pim
          POSTGRES_PASSWORD: ChangeMeInDev
          POSTGRES_DB: pim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, opcache, pcntl, pdo_pgsql, zip
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            apps/api/vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate JWT keypair for tests
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -aes256 -pass pass:ci -pkeyopt rsa_keygen_bits:4096
          openssl pkey -in config/jwt/private.pem -passin pass:ci -pubout -out config/jwt/public.pem

      - name: Run PHPUnit
        run: php bin/phpunit
        env:
          APP_ENV: test
          APP_DEBUG: "0"
          # Foundry's ResetDatabase rebuilds the schema from entity metadata into the
          # dbname_suffix-derived "pim_test" database — Postgres service is enough,
          # no migrations step required for the Sprint-0 entity surface.
          DATABASE_URL: postgresql://pim:ChangeMeInDev@127.0.0.1:5432/pim?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: in-memory://
          MERCURE_URL: http://localhost/.well-known/mercure
          MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
          MERCURE_JWT_SECRET: ci-mercure-key-at-least-256-bits-long
          JWT_PASSPHRASE: ci
          APP_DEFAULT_TENANT_CODE: demo

      # AUD-063 — meta-assertion guarding the memory gate below. An empty
      # `--group import-benchmark` selection runs 0 tests and exits 0, so if
      # the benchmark tests are ever deleted/renamed out of the group the
      # 256 MiB ceiling would silently stop being enforced while CI stays
      # green. This step fails the (required) phpunit job when the group is
      # empty. `^ - ` matches PHPUnit 12's per-test `--list-tests` prefix.
      - name: Assert import-benchmark group is non-empty
        run: |
          COUNT=$(php bin/phpunit --group import-benchmark --list-tests 2>/dev/null | grep -cE '^ - ' || true)
          if [ "$COUNT" -lt 1 ]; then
            echo "::error::import-benchmark group is empty — the 256 MiB memory gate would silently pass. Re-tag the benchmark tests with @group import-benchmark."
            exit 1
          fi
          echo "import-benchmark tests: $COUNT"
        env:
          APP_ENV: test
          APP_DEBUG: "0"
          DATABASE_URL: postgresql://pim:ChangeMeInDev@127.0.0.1:5432/pim?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: in-memory://
          MERCURE_URL: http://localhost/.well-known/mercure
          MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
          MERCURE_JWT_SECRET: ci-mercure-key-at-least-256-bits-long
          JWT_PASSPHRASE: ci
          APP_DEFAULT_TENANT_CODE: demo

      # IMP2-2.6 (#1482) — etap-2 memory gate. Excluded from the default run
      # (phpunit.dist.xml <groups>); the explicit --group overrides that and
      # runs the heavy 5k/50k import + export benchmarks with a 256 MiB ceiling.
      - name: Run memory benchmarks (import-benchmark group)
        run: php bin/phpunit --group import-benchmark
        env:
          APP_ENV: test
          APP_DEBUG: "0"
          DATABASE_URL: postgresql://pim:ChangeMeInDev@127.0.0.1:5432/pim?serverVersion=16&charset=utf8
          MESSENGER_TRANSPORT_DSN: in-memory://
          MERCURE_URL: http://localhost/.well-known/mercure
          MERCURE_PUBLIC_URL: http://localhost/.well-known/mercure
          MERCURE_JWT_SECRET: ci-mercure-key-at-least-256-bits-long
          JWT_PASSPHRASE: ci
          APP_DEFAULT_TENANT_CODE: demo

  openapi-spec:
    name: OpenAPI spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, opcache, pdo_pgsql
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: |
            apps/api/vendor
            ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate JWT keypair (cache:warmup boots Lexik)
        run: |
          mkdir -p config/jwt
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -aes256 -pass pass:ci -pkeyopt rsa_keygen_bits:4096
          openssl pkey -in config/jwt/private.pem -passin pass:ci -pubout -out config/jwt/public.pem

      # Re-export the OpenAPI spec and compare against the snapshot
      # at `docs/api-spec/v0.json`. The CI fails when a PR changes API
      # surface without bumping the spec — same idea as a Doctrine
      # schema drift check, applied to the contract integrators read.
      - name: Export OpenAPI spec
        run: php bin/console api:openapi:export | python3 -m json.tool > /tmp/v0.expected.json
        env:
          APP_ENV: dev
          APP_DEBUG: "0"
          DATABASE_URL: postgresql://pim:ChangeMeInDev@127.0.0.1:5432/pim?serverVersion=16&charset=utf8
          JWT_PASSPHRASE: ci

      - name: Compare against snapshot
        working-directory: ${{ github.workspace }}
        run: |
          if ! diff -u docs/api-spec/v0.json /tmp/v0.expected.json; then
            echo "::error::OpenAPI spec drift — re-export with"
            echo "::error::    docker compose exec -T api php bin/console api:openapi:export | python3 -m json.tool > docs/api-spec/v0.json"
            echo "::error::and commit the result."
            exit 1
          fi
