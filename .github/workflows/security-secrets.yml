name: Security (secrets scan)

# RBAC-P1-001 (#640) — secrets-leak guard rail.
#
# Two independent scanners run in parallel (defence in depth):
#   - gitleaks: regex-based, catches predictable patterns (AWS keys,
#     Stripe tokens, Anthropic keys, JWT secrets, RSA private keys).
#   - trufflehog: high-entropy + verified-secret mode, catches keys
#     that gitleaks would miss (random-looking tokens with structure).
#
# Runs on every PR + push to main. Either failing blocks merge.
#
# Local pre-commit hook (.husky/pre-commit) runs trufflehog if installed
# — see docs/security/tooling.md for the local install instructions.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-secrets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Gitleaks (regex-based)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # fetch-depth: 0 lets gitleaks scan the full diff against base.
          # For push-to-main events, fetches the prior commit so the
          # action can compare HEAD~1..HEAD.
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free tier — no licence required for public repos. Internal
          # secret-leak detection on a private repo would need GITLEAKS_LICENSE,
          # but the action degrades gracefully (logs a notice, still runs
          # the open-source rule set).
          GITLEAKS_NOTIFY_USER_LIST: "@malipie"

  trufflehog:
    name: TruffleHog (entropy + verified)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          # Scan the diff range for PRs, full history on push.
          # `--only-verified` would skip unverified findings; we keep them
          # on so reviewer sees high-entropy strings as warnings even
          # when the secret isn't validated against a live service.
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event.pull_request.head.sha || github.event.after }}
          extra_args: --results=verified,unknown
