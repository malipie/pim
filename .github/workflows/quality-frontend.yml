name: Quality (Frontend)

# Runs on every PR + push to main. Branch protection on main requires this to pass.

on:
  pull_request:
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/quality-frontend.yml"
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "packages/**"
      - "biome.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/quality-frontend.yml"

concurrency:
  group: quality-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  biome:
    name: Biome strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm --filter @pim/admin lint

  typecheck:
    name: TypeScript noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm --filter @pim/admin typecheck

  build:
    name: Vite build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @pim/admin build
