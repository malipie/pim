; PIM API — PHP runtime tuning for FrankenPHP worker mode.
; See agent/lessons.md "Memory management" for the rationale of these values.

date.timezone = UTC

; AUD-067 — never advertise the PHP version. Without this PHP appends an
; `X-Powered-By: PHP/8.4.x` header to every response, leaking the exact
; runtime version to any client (a reconnaissance hint for version-specific
; CVEs). The edge Caddy also strips it (`-X-Powered-By` in docker/caddy/
; Caddyfile) as the primary, always-applied control — this is the in-process
; backstop so a direct hit on the FrankenPHP container is covered too.
expose_php = Off

memory_limit = 256M
max_execution_time = 30

; Asset uploads (#1214) — must accommodate the app-level limits enforced in
; UploadAssetController (images 25 MB, PDF 50 MB). PHP's 2M/8M defaults truncate
; the multipart body before the controller runs, surfacing as a broken upload
; ("HTTP 200"). post_max_size must exceed upload_max_filesize to leave room for
; multipart field overhead. IMP2-2.7 (#1483) raised these to the D10 import
; ceiling (100 MB); the per-tenant application guard (Tenant.importMaxFileSize)
; is the primary, RFC-7807 control — this is the hard PHP backstop above it.
upload_max_filesize = 100M
post_max_size = 110M

; OPcache — JIT enabled for Symfony hot paths.
opcache.enable = 1
opcache.enable_cli = 0
opcache.jit = tracing
opcache.jit_buffer_size = 64M
opcache.memory_consumption = 192
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

; Worker mode lives between requests — Doctrine identity map MUST be cleared
; between handler invocations. PHPStan custom rule blokuje flush() bez clear().
; This is enforced at code level, not runtime — see lessons.md.

; Realpath cache helps autoload performance under high request rates.
realpath_cache_size = 4M
realpath_cache_ttl = 600

; Disable error display in dev (we still log them); production overrides via env.
display_errors = 0
display_startup_errors = 0
log_errors = 1
error_log = /dev/stderr

; Symfony recommended.
session.use_strict_mode = 1
