when@dev: &dev
    # See full configuration: https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#full-default-bundle-configuration
    zenstruck_foundry:
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true

    # If you use the `make:factory --test` command, you may need to uncomment the following.
    # See https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#generate
    #services:
    #    App\Tests\Factory\:
    #        resource: '%kernel.project_dir%/tests/Factory/'
    #        autowire: true
    #        autoconfigure: true

when@test:
    zenstruck_foundry:
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true
        # AUD-082 — seed the tenant-agnostic permission catalogue exactly once
        # per test session instead of in every ApiTestCase::setUp(). Foundry
        # commits global state before the per-test DAMA transaction, so it
        # survives every rollback. See App\Tests\State\DefaultTestState.
        global_state:
            - 'App\Tests\State\DefaultTestState'
