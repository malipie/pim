framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # The "app" cache stores to the filesystem by default.
        # The data in this cache should persist between deploys.
        # Other options include:

        # Redis
        #app: cache.adapter.redis
        #default_redis_provider: redis://localhost

        # APCu (not recommended with heavy random-write workloads as memory fragmentation can cause perf issues)
        #app: cache.adapter.apcu

        pools:
            # UI-08.4 (#259) — TagAware pool for the EffectiveAttributeGroupResolver
            # / form-schema cache. Tags allow ObjectFormSchemaCacheInvalidator to
            # nuke per-ObjectType groups on attachment changes without enumerating
            # individual cache keys. Backed by `cache.app` (filesystem dev/test,
            # Redis in prod via env override).
            pim.modeling_cache:
                adapter: cache.app
                default_lifetime: 300
                tags: true

            # RBAC-P2-006 (#655) — TagAware pool for PermissionResolver.
            # Tags allow PermissionInvalidationListener to nuke per-user
            # and per-role cache entries on UserRole / RolePermission /
            # Role updates without enumerating individual keys. Backed by
            # cache.app (filesystem dev/test, Redis in prod via env override).
            pim.permissions_cache:
                adapter: cache.app
                default_lifetime: 300
                tags: true
