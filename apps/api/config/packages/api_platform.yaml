api_platform:
    title: PIM API
    description: Product Information Management — REST API surface (per ADR-009 generic ObjectType + sugar paths).
    version: 0.1.0

    # Resource declarations live next to the bounded contexts in
    # Infrastructure/ApiPlatform/Resource (per ADR-0011 — Domain stays
    # framework-agnostic, AP4 metadata is bridged via XML the same way
    # Doctrine ORM mapping is). Add a new path here when a new BC starts
    # exposing entities.
    mapping:
        paths:
            - '%kernel.project_dir%/src/Catalog/Infrastructure/ApiPlatform/Resource'
            - '%kernel.project_dir%/src/Channel/Infrastructure/ApiPlatform/Resource'
            - '%kernel.project_dir%/src/Asset/Infrastructure/ApiPlatform/Resource'
            - '%kernel.project_dir%/src/ApiConfigurator/Infrastructure/ApiPlatform/Resource'
            - '%kernel.project_dir%/src/Import/Infrastructure/ApiPlatform/Resource'
            - '%kernel.project_dir%/src/Integration/Generic/Infrastructure/ApiPlatform/Resource'

    # AP4 default content negotiation: JSON-LD (Hydra) for application use,
    # plain JSON kept available for tooling that does not understand
    # JSON-LD. PATCH must use RFC 7396 merge-patch.
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    patch_formats:
        json: ['application/merge-patch+json']

    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']

    # OpenAPI customization (#46 / 0.4.6).
    #
    # `swagger.api_keys` advertises the JWT bearer header (current MVP) and
    # reserves the API-key header (`X-API-Key`) for the API Configurator
    # in epic 0.10 (#94). Both render as security schemes in `/api/docs`
    # so an integrator gets a clickable "Authorize" button without
    # reading the code.
    #
    # `enable_swagger_ui: true` is the AP4 default in dev/staging.
    # In production it is forced off via `when@prod` below — integrators
    # consume the OpenAPI document directly (versioned snapshot under
    # `docs/api-spec/`) instead of an interactive UI exposed on the
    # public origin (audit MEDIUM-006).
    swagger:
        versions: [3]
        api_keys:
            JWT:
                name: Authorization
                type: header
            ApiKey:
                name: X-API-Key
                type: header
    enable_swagger_ui: true

when@prod:
    api_platform:
        # Disable the interactive Swagger UI surface in production.
        # The OpenAPI JSON document remains reachable for tooling that
        # needs the contract (e.g. integrators generating clients), but
        # the HTML "try it now" UI is no longer exposed at `/api/docs`.
        enable_swagger_ui: false
        enable_re_doc: false
        # Keep the OpenAPI JSON document; a route guard at the firewall
        # level can be layered later if even the JSON surface becomes
        # sensitive.
        enable_docs: true
