doctrine:
    dbal:
        # AUD-002 (W1-1) — two named connections for the application/migration
        # privilege split:
        #   - `default`   the runtime connection (DATABASE_URL → role `pim_app`,
        #                 NOSUPERUSER + NOBYPASSRLS + non-owner). FORCE ROW LEVEL
        #                 SECURITY is therefore actually enforced on every query
        #                 the app issues. Used by the ORM, every repository, and
        #                 the Messenger worker.
        #   - `owner`     the schema/migration connection (DATABASE_URL_OWNER →
        #                 role `pim` = table owner). DDL (ALTER TABLE … ENABLE/
        #                 FORCE RLS, CREATE POLICY) requires ownership, which the
        #                 non-owner `pim_app` deliberately lacks. doctrine_migrations
        #                 below pins migrations to this connection so `pim_app`
        #                 never needs (and never gets) DDL or BYPASSRLS rights.
        # DATABASE_URL_OWNER falls back to DATABASE_URL so a single-role setup
        # (e.g. a throwaway sandbox that never split the roles) still boots.

        # Custom DBAL types live next to the bounded context that owns them.
        # `ltree` is a Postgres-only type used by `objects.path` for the
        # category tree (#33 / 0.3.3). Doctrine ORM 3 ships no native mapping;
        # the adapter is a thin pass-through over text. `types` is a DBAL-level
        # key (shared by every connection), not a per-connection one.
        types:
            ltree: App\Catalog\Infrastructure\Doctrine\Type\LtreeType

        default_connection: default
        connections:
            default:
                url: '%env(resolve:DATABASE_URL)%'

                # IMPORTANT: You MUST configure your server version,
                # either here or in the DATABASE_URL env var (see .env file)
                #server_version: '16'

                # Tell Doctrine's schema introspector that the Postgres `ltree`
                # column type maps back to our `ltree` Doctrine type. Without
                # this, `doctrine:schema:drop --full-database` (Foundry's
                # ResetDatabase trait) trips with "Unknown database type ltree".
                mapping_types:
                    ltree: ltree

                # Backtrace collection is the dev default but is incompatible with
                # FrankenPHP worker mode + long-running handlers: every executed
                # query holds a full stack trace in BacktraceDebugDataHolder for
                # the lifetime of the worker. A 60-row XLSX import dispatched
                # through the in-band sync transport fires ~10 queries per row
                # (ObjectType / Category / attribute lookups, object + value
                # inserts, audit log writes) and pushes a single worker past the
                # 256 MiB ceiling. Symfony's web profiler still records query
                # counts and SQL strings through the regular data collector — we
                # only drop the per-query backtrace.
                profiling_collect_backtrace: false
                use_savepoints: true

                # Disable query logging globally — sekcja 3.10 architektury and
                # ticket 0.0.13 call this out as a memory-leak source under
                # FrankenPHP worker mode: the logger keeps every executed query in
                # memory for the lifetime of the worker. Symfony's debug profiler
                # still captures queries through a separate collector, so dev/test
                # debugging is unaffected.
                logging: false

            owner:
                url: '%env(resolve:DATABASE_URL_OWNER)%'
                # Same Postgres-specific mapping so migration introspection of
                # `ltree` columns does not trip "Unknown database type ltree".
                mapping_types:
                    ltree: ltree
                profiling_collect_backtrace: false
                use_savepoints: true
                logging: false

    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        # Each bounded context maps explicitly. auto_mapping would scan
        # the default src/Entity (Symfony skeleton placeholder) and clash
        # with the bundle-style structure under src/{Context}/Domain/Entity.
        auto_mapping: false

        # Postgres JSONB containment as a DQL function (`#43`). Powers the
        # `AttributeFilter` (`?attribute[brand]=Nike`) — emits
        # `attributes_indexed @> '{...}'::jsonb` so the partial GIN index
        # on `objects.attributes_indexed` answers the lookup.
        dql:
            string_functions:
                JSONB_CONTAINS: App\Catalog\Infrastructure\Doctrine\Dql\JsonbContainsFunction
                JSONB_GET_TEXT: App\Catalog\Infrastructure\Doctrine\Dql\JsonbGetTextFunction
                LTREE_DESCENDANT_OF: App\Catalog\Infrastructure\Doctrine\Dql\LtreeDescendantOfFunction
            numeric_functions:
                JSONB_GET_NUMERIC: App\Catalog\Infrastructure\Doctrine\Dql\JsonbGetNumericFunction
        mappings:
            Shared:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Shared/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Shared\Domain'
                alias: Shared
            Catalog:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Catalog/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Catalog\Domain\Entity'
                alias: Catalog
            Channel:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Channel/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Channel\Domain\Entity'
                alias: Channel
            Asset:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Asset/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Asset\Domain\Entity'
                alias: Asset
            Identity:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Identity/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Identity\Domain\Entity'
                alias: Identity
            ApiConfigurator:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/ApiConfigurator/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\ApiConfigurator\Domain\Entity'
                alias: ApiConfigurator
            Import:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Import/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Import\Domain\Entity'
                alias: Import
            Export:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Export/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Export\Domain\Entity'
                alias: Export
            Backup:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Backup/Infrastructure/Doctrine/Orm/Mapping'
                prefix: 'App\Backup\Domain\Entity'
                alias: Backup
        controller_resolver:
            auto_mapping: false

        # Registered (declared) but disabled by default. Each request enables
        # it via TenantFilterConfigurator once the active tenant is known.
        # Native SQL bypasses this filter — RLS in phase 1 closes the gap.
        filters:
            tenant:
                class: App\Shared\Infrastructure\Doctrine\Filter\TenantFilter
                enabled: false

when@test:
    doctrine:
        dbal:
            connections:
                default:
                    # The test DB schema is built from ORM metadata by Foundry's
                    # ResetDatabase (schema:update / schema:drop), which is DDL and
                    # therefore needs the owner role — the runtime `pim_app` cannot
                    # create or drop tables it does not own. Point the test runtime
                    # connection at the owner DSN so the kernel boots against `pim`.
                    # The isolation tests that need a NOBYPASSRLS reader create a
                    # throwaway probe role and `SET ROLE` to it on the same
                    # connection (see RefreshTokenRlsGucDriftTest / the W1-1
                    # isolation test), so FORCE RLS is still exercised under test.
                    url: '%env(resolve:DATABASE_URL_OWNER)%'
                    # "TEST_TOKEN" is typically set by ParaTest
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'
                owner:
                    url: '%env(resolve:DATABASE_URL_OWNER)%'
                    dbname_suffix: '_test%env(default::TEST_TOKEN)%'

        # Enable query logging in tests — visibility into the SQL the filter
        # produces is worth the small allocation overhead.
        # Re-enable per-test if needed.

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
