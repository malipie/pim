framework:
    messenger:
        # Failed-handler envelopes are routed here so the worker pool can be
        # restarted without losing payloads. `messenger:failed:show` lists
        # them; `messenger:failed:retry` replays the queue.
        failure_transport: failed

        transports:
            # Synchronous in-process delivery — used for everything that
            # must complete inside the request lifecycle (CRUD commands,
            # event publishers that update read models / Mercure / webhooks).
            sync: 'sync://'

            # Asynchronous worker transport. Only background jobs route
            # here (bulk reindex, future agent jobs). The DSN is read
            # from `MESSENGER_TRANSPORT_DSN`; `.env.test` and
            # `.env.dev` override to `sync://` so handlers run in-band
            # during local + CI runs. Production points it at
            # `doctrine://default?queue_name=async` so the FrankenPHP
            # worker pool drains the queue.
            async: '%env(MESSENGER_TRANSPORT_DSN)%'

            failed: 'doctrine://default?queue_name=failed'

        buses:
            messenger.bus.default:
                # Domain events emitted by AggregateRoot::recordThat() may have
                # no subscribers in MVP (UserAuthenticated, RefreshTokenRotated)
                # — Faza 1+ adds them. allow_no_handlers stops Messenger from
                # raising NoHandlerForMessageException in that case while still
                # delivering to every registered handler.
                default_middleware:
                    enabled: true
                    allow_no_handlers: true
                middleware:
                    # Rebinds TenantContext on async handlers (audit
                    # HIGH-002 / 2026-04-29). Sync dispatches pass
                    # through — the request listener already set the
                    # context from the JWT principal.
                    - 'App\Shared\Infrastructure\Messenger\TenantContextRebindingMiddleware'
                    - 'App\Shared\Infrastructure\Messenger\IdempotencyMiddleware'
                    - doctrine_transaction

        # Explicit routing per message class (audit MEDIUM-007).
        #
        # Every async-routed message gets a dedicated entry below so the
        # destination transport stays the same across prod / dev / test —
        # the audit's central concern was that an empty routing block
        # silently diverges once an async transport ships in production.
        #
        # Domain events + Application Commands intentionally stay UNROUTED
        # (default `messenger.bus.default` synchronous handler dispatch).
        # Routing them through the `sync` transport adds an extra
        # Send → Receive hop per event, which under bulk seed paths
        # (DemoCatalogSeeder fires hundreds of events with fail-soft HTTP
        # publishers) shows up as ErrorChunk accumulation before GC catches
        # up. Default in-process dispatch is the established (and tested)
        # behavior — the audit recommendation is satisfied by ensuring
        # everything that DOES need a transport has its routing pinned.
        #
        # To onboard a new ASYNC message class: add an entry below AND a
        # dedicated test asserting the routing destination. Synchronous
        # message classes do not need entries.
        routing:
            # ---- Background jobs — asynchronous.
            # Bulk import / agent ops dispatch this to the worker pool so
            # the request thread does not stall on N×rebuild work. In
            # dev / test the async transport is a `sync://` alias so
            # behavior stays in-band without a worker.
            App\Catalog\Application\Message\ObjectValuesChangedMessage: async

            # CHC-05 (#1287) — after a confirmed category move that affects
            # products, the CHC-04 handler re-checks each product's schema
            # snapshot for drift off the request thread. `allow_no_handlers`
            # makes this a safe no-op enqueue until the CHC-04 handler lands.
            App\Catalog\Application\Message\CheckSchemaDriftForCategory: async

            # CHC-07 (#1290) — when a product's primary master category is
            # (re)assigned, the Channel handler auto-creates channel placements
            # from that category's node mappings off the request thread. The
            # event is recorded on the CatalogObject aggregate and dispatched
            # post-flush; routing it async keeps the assignment request fast.
            App\Catalog\Contracts\Event\ObjectPrimaryCategoryAssigned: async

            # DAM thumbnail pipeline (#438). The upload request returns
            # 201 immediately and the worker generates the 200×200 +
            # 800×800 WebP variants out-of-band. In dev / test the
            # async transport is `sync://`, so behaviour stays in-band
            # without spinning a worker.
            App\Asset\Contracts\Event\AssetThumbnailsRequested: async

            # Imports MVP (#445). Wizard `POST /api/import-sessions`
            # returns 201 immediately and the worker streams the file
            # row-by-row via {@see ImportRunHandler}. Sync small (<50
            # rows) imports bypass dispatch by calling `run()` directly
            # on the same handler from the controller.
            App\Import\Domain\Message\ImportRunMessage: async

            # Imports MVP (#447). pgBackRest snapshot can take 5-30
            # minutes — handler runs out-of-band so `POST /api/backups`
            # returns 202 immediately and the wizard polls
            # `GET /api/backups/{id}` for status.
            App\Backup\Domain\Message\BackupSnapshotMessage: async
