security:
    password_hashers:
        # Argon2id is the OWASP-recommended hasher for new applications. We
        # pin it explicitly instead of relying on `auto` because `auto` picks
        # a runtime-detected default — that is fine when libsodium is present
        # but yields surprising behaviour when it isn't, and the operator has
        # no way to notice the swap. Memory/time costs follow OWASP's 2024
        # baseline (memory >= 19 MiB, t >= 2). Cost is ~50 ms on a modern CPU.
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: argon2id
            memory_cost: 65536
            time_cost: 4

    providers:
        # Sprint 0: only the App\Identity user store is consulted. Static
        # in-memory users are gone — the `admin@pim.localhost` fixture is the
        # entry point until real onboarding lands.
        app_user_provider:
            entity:
                class: App\Identity\Domain\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # Login firewall: stateless JSON form. POST /api/auth/login with
        # {"email": ..., "password": ...} returns a signed JWT in the body
        # AND sets the rotating refresh-token cookie via LoginSuccessHandler
        # (#28). The custom handler wraps the Lexik default; it does not
        # replace JWT issuance.
        # user_checker (RBAC-P5-021 #711) — refuses the login when the
        # caller's tenant is suspended or soft-deleted on top of the
        # default user-level checks.
        login:
            pattern: ^/api/auth/login$
            stateless: true
            user_checker: App\Identity\Infrastructure\Security\TenantUserChecker
            json_login:
                check_path: /api/auth/login
                username_path: email
                success_handler: App\Identity\Presentation\LoginSuccessHandler
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # API firewall: every /api/* request must authenticate with EITHER
        # a JWT (admin / human callers — issued by the login firewall) OR
        # an `X-API-Key` header (machine integrators — minted via
        # `pim:apikey:generate` per epic 0.10). Both authenticators run;
        # `supports()` picks the one that matches the request.
        api:
            pattern: ^/api
            stateless: true
            user_checker: App\Identity\Infrastructure\Security\TenantUserChecker
            jwt: ~
            custom_authenticators:
                - App\ApiConfigurator\Infrastructure\Security\ApiKeyAuthenticator
                # RBAC-P2-003 (#652) — Identity ApiToken auth (Authorization: Token cortex_...).
                # Distinct from JWT (Bearer) and ApiKey (X-API-Key) so supports() picking is deterministic.
                - App\Identity\Infrastructure\Security\RbacApiTokenAuthenticator
            provider: app_user_provider

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        # Public auth + docs + metrics. Everything else under /api requires JWT.
        # /api/metrics is the Prometheus scrape endpoint; production should
        # bind it on a private network or fence it behind a scrape token,
        # both of which land in epik 0.11 hardening (#103-#105).
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        # /api/auth/refresh consumes the rotating refresh-token cookie. It
        # must be reachable without an access token because the typical
        # caller has just had its access token expire.
        - { path: ^/api/auth/refresh, roles: PUBLIC_ACCESS }
        # #1141 — second factor of login. The caller has passed the password
        # step but holds no JWT yet; authority is the opaque, short-lived
        # challenge token minted after the password step (see MfaLoginController).
        - { path: ^/api/auth/2fa/login, roles: PUBLIC_ACCESS }
        # RBAC-P2-008 (#657) / P2-009 (#658) — magic-link accept + password
        # reset confirm are open by design: the token IS the auth factor.
        # /api/invitations/{token}/accept matches the path below; the
        # token character class is enforced at the controller route level.
        - { path: '^/api/invitations/[a-f0-9]+/accept$', roles: PUBLIC_ACCESS }
        # RBAC-P5-017 (#707) — accept invitation page calls verify before
        # showing the password form. Same auth model as /accept: the
        # token IS the auth factor; account does not exist yet.
        - { path: '^/api/invitations/[a-f0-9]+/verify$', roles: PUBLIC_ACCESS }
        - { path: '^/api/auth/password-reset/(request|confirm)$', roles: PUBLIC_ACCESS }
        # RBAC-P2-012/013/014 SSO callback endpoints — provider's OAuth/SAML
        # assertion IS the auth factor; no PIM session required.
        - { path: '^/api/auth/sso/', roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS }
        - { path: ^/api/metrics$, roles: PUBLIC_ACCESS }
        - { path: ^/api$, roles: PUBLIC_ACCESS }
        # /api/assets/{uuid}/preview streams thumbnail/medium/original
        # bytes for `<img>` tags in the admin grid. `<img>` cannot send
        # the Bearer header, so the firewall must let the request through
        # without a JWT — but authority is NOT path-knowledge. AUD-006
        # (#1576): the request must carry a short-lived HMAC signature
        # minted by AssetPreviewUrlSigner (the catalog read API hands out
        # signed `previewUrl`s only to authenticated callers). The
        # controller verifies the signature before loading any row and
        # 403s an unsigned/expired/tampered request — same "the token IS
        # the auth factor" model as the magic-link / SSO-callback routes
        # above. PUBLIC_ACCESS here means "no session required", not
        # "no credential required".
        - { path: '^/api/assets/[0-9a-f-]+/preview$', roles: PUBLIC_ACCESS }
        # `IS_AUTHENTICATED_FULLY` covers BOTH a logged-in user (ROLE_USER
        # + tenant context) and an API key principal (ROLE_API_KEY). The
        # voter chain enforces row-level access on top.
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            # Tests still hash with argon2id (matching production), but at the
            # cheapest legal parameters so the suite stays fast. memory_cost is
            # in KiB; 8 KiB is the lowest libsodium accepts. The format check
            # in AuthApiTest then exercises the same `$argon2id$` PHC string
            # the production hasher would produce.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: argon2id
                # libsodium minimums: opsLimit (time_cost) >= 3, memLimit
                # (memory_cost in KiB) >= 64 KiB. Below those bounds the hasher
                # throws at runtime — these are the floor values, not arbitrary.
                memory_cost: 64
                time_cost: 3
