# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Serializer metadata (#42 / 0.4.2 — per-context groups). Mirrors the
    # ADR-0011 pattern for Doctrine ORM: Domain stays plain PHP, mapping
    # lives next to the persistence adapter. Each BC contributes XML
    # files to `<BC>/Infrastructure/Serializer/<Entity>.xml` declaring
    # `<group>admin:read</group>` etc. per attribute.
    serializer:
        mapping:
            paths:
                - '%kernel.project_dir%/src/Catalog/Infrastructure/Serializer'
                - '%kernel.project_dir%/src/Channel/Infrastructure/Serializer'
                - '%kernel.project_dir%/src/Asset/Infrastructure/Serializer'
                - '%kernel.project_dir%/src/ApiConfigurator/Infrastructure/Serializer'
                - '%kernel.project_dir%/src/Import/Infrastructure/Serializer'

    #esi: true
    #fragments: true

    # Rate limiters (#48 / 0.4.8). In-memory cache pool keeps Sprint 0
    # zero-infrastructure — `cache.app` defaults to filesystem in dev
    # and Redis in prod via Symfony's standard cache hierarchy. Move
    # to a shared Redis pool when multi-worker FrankenPHP exposes
    # racing windows (Faza 1).
    rate_limiter:
        # Anti-bruteforce on `/api/auth/login` — 5 attempts per IP per
        # 15-minute window. Successful logins still tick the counter
        # (defence in depth: stolen credentials should not re-tick).
        # `0.11.2` is the dedicated hardening ticket; this lands the
        # baseline limiter so its consumer test rides under #48 already.
        auth_login:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'

        # Agent run limiter (sekcja 8.5 architektury — 50/h/user).
        # Reserved here so the agent endpoint in epic 0.7 (Faza 2)
        # consumes `LimiterFactory $agentRunLimiter`. Sliding window
        # smooths edge-of-hour bursts.
        agent_run:
            policy: 'sliding_window'
            limit: 50
            interval: '1 hour'

        # Integration sync limiter (10 syncs / hour / tenant).
        # Reserved for BaseLinker (#74) and Shopify (#81) sync
        # endpoints in Faza 1.
        integration_sync:
            policy: 'fixed_window'
            limit: 10
            interval: '1 hour'

        # IMP-06 (#447) — manual pgBackRest snapshot. Spec §7.8 caps
        # at 1/h/tenant so a power-click on the Step 4 checkbox
        # cannot saturate the disk. Sliding window so back-to-back
        # legitimate retries (network blip, second attempt the next
        # minute) wait the full hour, not just the next tick.
        # IMP2-2.10 (#1486) — the pre-import backup checkbox reuses THIS limiter
        # (the wizard POSTs /api/backups with triggered_by_action=pre_import).
        # 1/h/tenant is fine for manual wizard imports, but it collides with
        # scheduled imports (IMP2-4.1): a cron that also snapshots would exhaust
        # the budget. DECISION: pre-import backup stays a MANUAL-wizard-only
        # feature; IMP2-4.1 must NOT auto-trigger backups through this limiter.
        # See docs/architecture/concurrency-matrix.md (§ backup_trigger).
        backup_trigger:
            policy: 'sliding_window'
            limit: 1
            interval: '1 hour'

        # IMP2-2.7 (#1483) — import session start. A bulk import is heavy (parse +
        # N×write + async rebuild); 20/h/tenant absorbs honest wizard re-runs and
        # retries while clamping a script firing import-after-import.
        import_trigger:
            policy: 'sliding_window'
            limit: 20
            interval: '1 hour'

        # Refresh-token rotation (#28). The cookie-driven path is
        # invoked by every browser session every ~15 minutes, but
        # the only legitimate caller is a single tab — 30/h/IP
        # absorbs honest tab churn while clamping a stolen-cookie
        # replay loop (where a malicious script polls /refresh
        # to siphon access tokens). 0.11.2 hardening.
        auth_refresh:
            policy: 'sliding_window'
            limit: 30
            interval: '1 hour'

        # Public API surface for X-API-Key callers (#94). Per-key
        # budget reuses the request key's `keyPrefix` so a partner
        # cannot exhaust budget for another partner. 1000/h is the
        # default; ApiProfile.rateLimitPerHour overrides per profile
        # in a follow-up — this is the floor.
        api_key:
            policy: 'sliding_window'
            limit: 1000
            interval: '1 hour'

        # AUD-030 (W2-12) — password-reset request anti-spam / anti-enumeration.
        # The endpoint is PUBLIC_ACCESS and always-200 (account-enumeration
        # prevention), which made it a free spam + timing-oracle target with no
        # `consume()`. Two layered limiters keyed differently:
        #   - per-email (5/15min): primary control — a single address cannot be
        #     used to hammer the mailer side-effect or probe for existence.
        #   - per-IP (10/15min): catches one host spraying many addresses.
        # Crossing EITHER → 429 problem+json. The 429 is a deliberate rate-limit
        # signal, NOT an enumeration leak: real + unknown emails share the same
        # per-email bucket, so the status never reveals whether the account
        # exists. Fixed window mirrors auth_login (the sibling anti-bruteforce
        # control); same `cache.app` filesystem-dev / Redis-prod backing.
        password_reset_email:
            policy: 'fixed_window'
            limit: 5
            interval: '15 minutes'
        password_reset_ip:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'

        # AUD-030 (W2-12) — magic-link invitation accept anti-bruteforce.
        # The accept endpoint is PUBLIC_ACCESS (the 64-hex token IS the auth
        # factor) and was unbounded — an attacker could brute the token space
        # or hammer the password-hashing side-effect. Per-IP 10/15min clamps
        # the attempt rate before the controller validates the token. Keyed by
        # IP only: there is no pre-auth identifier on accept (the account does
        # not exist yet), and an honest invitee accepts exactly once.
        invitation_accept:
            policy: 'fixed_window'
            limit: 10
            interval: '15 minutes'

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
