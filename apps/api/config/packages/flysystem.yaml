# Flysystem storage configuration.
#
# `assets.storage` is the named storage for the Asset bounded context (#37).
# Backed by an S3-compatible adapter against MinIO in dev, S3 in production.
# All credentials + endpoint live in environment variables so the same YAML
# works dev → prod.
#
# Bucket layout: every Asset row stores a `storage_path` relative to the
# bucket root (e.g. `<tenant-uuid>/<asset-uuid>/original.jpg`). Tenant
# isolation rides on the path prefix — RLS does not extend to object
# storage in MVP, so the application layer is the only barrier.

services:
    pim.assets.s3_client:
        class: Aws\S3\S3Client
        public: false
        arguments:
            - endpoint: '%env(AWS_ASSETS_ENDPOINT)%'
              region: '%env(AWS_ASSETS_REGION)%'
              version: 'latest'
              use_path_style_endpoint: true
              credentials:
                  key: '%env(AWS_ASSETS_KEY)%'
                  secret: '%env(AWS_ASSETS_SECRET)%'

flysystem:
    storages:
        assets.storage:
            adapter: 'aws'
            options:
                client: 'pim.assets.s3_client'
                bucket: '%env(AWS_ASSETS_BUCKET)%'
        # IMP-04 (#445) — wizard-uploaded source files (CSV / xlsx + ZIP).
        # Same MinIO instance as assets, dedicated bucket so a TTL policy
        # (7 days, spec §8.6) can purge stale uploads without touching DAM.
        imports.storage:
            adapter: 'aws'
            options:
                client: 'pim.assets.s3_client'
                bucket: '%env(default::AWS_IMPORTS_BUCKET)%'
        # EXP-01 (#580) — generated export files (XLSX / CSV).
        # PRD §11.1: bucket layout `<tenant_id>/<session_id>.<format>`.
        # Forever retention for paid tiers (PRD §11.7); Free tier 7d cleanup
        # lands with sessions API (EXP-08) + scheduled command.
        exports.storage:
            adapter: 'aws'
            options:
                client: 'pim.assets.s3_client'
                bucket: '%env(default::AWS_EXPORTS_BUCKET)%'

# CI does not run a MinIO service; the functional `AssetUploaderTest`
# still wants to write through the real Flysystem operator (it proves the
# wiring + the storage path layout). Local adapter under `var/test/assets`
# gives the same operator interface without a network dependency.
when@test:
    flysystem:
        storages:
            assets.storage:
                adapter: 'local'
                options:
                    directory: '%kernel.project_dir%/var/test/assets'
            imports.storage:
                adapter: 'local'
                options:
                    directory: '%kernel.project_dir%/var/test/imports'
            exports.storage:
                adapter: 'local'
                options:
                    directory: '%kernel.project_dir%/var/test/exports'
