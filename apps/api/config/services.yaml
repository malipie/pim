# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # Sprint 0 fallback: until full auth lands in #4 / #24, the listener resolves
    # the active tenant by code from this env var. Smoke test #12 (0.0.12) flips
    # the env between two seeded tenants to verify isolation. Production sets it
    # only for the BYOK admin / migration commands; everything else relies on the
    # authenticated user (TenantAware).
    app.default_tenant_code: '%env(default::APP_DEFAULT_TENANT_CODE)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Identity\Application\CurrentTenantProvider:
        arguments:
            $defaultTenantCode: '%app.default_tenant_code%'
