# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # Sprint 0 fallback: until full auth lands in #4 / #24, the listener resolves
    # the active tenant by code from this env var. Smoke test #12 (0.0.12) flips
    # the env between two seeded tenants to verify isolation. Production sets it
    # only for the BYOK admin / migration commands; everything else relies on the
    # authenticated user (TenantAware).
    app.default_tenant_code: '%env(default::APP_DEFAULT_TENANT_CODE)%'

    # Refresh-token cookie (#28). TTL is an ISO-8601 interval so the same value
    # drives both the persisted `expires_at` column and the cookie `Max-Age`.
    # `cookie_secure` is forced false in `when@test` because BrowserKit talks
    # plain HTTP to the kernel and would silently drop `Secure` cookies on
    # follow-up requests, which would break round-trip refresh tests.
    pim.refresh_token.cookie_name: 'pim_refresh_token'
    pim.refresh_token.ttl: 'P30D'
    pim.refresh_token.cookie_secure: true

    # Catalog feature flags (#32). `enable_custom_object_types` blocks the
    # creation of ObjectType rows with kind=custom in MVP — only the three
    # built-in kinds (product/category/asset) are available. Phase 2 unlocks
    # custom kinds together with the agent tool `create_object_type` (R-29
    # mitigation: "custom kinds without UX support is an over-engineering
    # trap"). Tests pass the flag through the constructor directly when
    # they need to exercise the unlocked path.
    # 2026-05-01 (UI-02 follow-up): flipped to true so the modeling UI
    # exposes a Create custom ObjectType flow today. The DB schema has
    # supported `kind=custom` rows from day 1 (R-29 mitigation), and the
    # admin already has the form (`<CreateCustomObjectTypeDialog>`)
    # backed by the new `POST /api/object_types` endpoint. Override
    # back to `false` per-tenant once role gating ships in Faza 1
    # ADR-013.
    pim.catalog.enable_custom_object_types: '%env(bool:CATALOG_ENABLE_CUSTOM_OBJECT_TYPES)%'

    # Asset upload limits (#438 — DAM MVP). Per-MIME caps decoupled
    # because PDFs are realistically larger than product imagery yet
    # still bounded; raster images stop at 25 MB so a power-user dump
    # of 50 hi-res JPEGs cannot saturate a worker. Validation lives in
    # `UploadAssetController`; the matching frontend constant in
    # `apps/admin/src/lib/asset-upload.ts` mirrors these so the
    # dropzone rejects oversize files before the bytes hit the wire.
    pim.asset.upload.max_image_bytes: 26214400   # 25 MB
    pim.asset.upload.max_pdf_bytes: 52428800     # 50 MB

    # IMP-02 (#443) — rules-based mapping dictionary path. Loaded once
    # per container build, then served from `cache.app` for 5 min so
    # the wizard's auto-map step does not re-parse the YAML on every
    # column header.
    pim.imports.dictionary_path: '%kernel.project_dir%/config/imports/mapping_dictionary.yaml'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Auto-tag concrete AP4 Doctrine filters (#43 / 0.4.3) so resource
    # XML references work without per-class tag entries below.
    _instanceof:
        ApiPlatform\Doctrine\Orm\Filter\FilterInterface:
            tags: ['api_platform.filter']

    App\:
        resource: '../src/'

    App\Identity\Application\CurrentTenantProvider:
        arguments:
            $defaultTenantCode: '%app.default_tenant_code%'

    App\Identity\Application\RefreshTokenService:
        arguments:
            $ttl: '%pim.refresh_token.ttl%'

    App\Identity\Presentation\AuthCookieFactory:
        arguments:
            $cookieName: '%pim.refresh_token.cookie_name%'
            $ttl: '%pim.refresh_token.ttl%'
            $secure: '%pim.refresh_token.cookie_secure%'

    App\Identity\Presentation\LoginSuccessHandler:
        arguments:
            $inner: '@lexik_jwt_authentication.handler.authentication_success'

    App\Catalog\Application\ObjectTypeService:
        arguments:
            $enableCustomObjectTypes: '%pim.catalog.enable_custom_object_types%'

    # DAM MVP upload entry point (#438). The size caps are wired through
    # parameters so deployment-specific overrides land in env vars
    # (e.g. enterprise tier raises the PDF cap).
    App\Asset\Presentation\Controller\UploadAssetController:
        arguments:
            $maxImageBytes: '%pim.asset.upload.max_image_bytes%'
            $maxPdfBytes: '%pim.asset.upload.max_pdf_bytes%'

    # Bind the assets storage operator to the Imagick processor so the
    # async thumbnail handler picks the right Flysystem instance from
    # the Flysystem bundle (the bundle exposes one operator per
    # filesystem name).
    App\Asset\Application\Thumbnail\ImageProcessorInterface:
        alias: App\Asset\Infrastructure\Thumbnail\ImagickImageProcessor

    # Per-AttributeType validator dispatcher (#39). The factory wires up
    # one validator per AttributeType so the rest of the app can ask
    # "is this {value: ...} payload valid against this Attribute?" without
    # branching on the type. New types: extend the factory + add the
    # matching TypeValidator implementation.
    App\Catalog\Application\Validation\AttributeValueValidator:
        factory: ['App\Catalog\Application\Validation\AttributeValueValidator', 'default']
        arguments: []

    # Kind-aware ApiResource hooks (#128). Built-in Product/Category/Asset
    # ship via dedicated sugar paths in #41; this layer holds the metadata
    # + decorator the AP4 declarations call into. Wired up now so #41 only
    # has to drop the `#[ApiResource]` annotations + per-kind normalizers
    # — no bootstrap chain change required.
    App\Catalog\Infrastructure\ApiPlatform\CustomObjectTypeApiGuard:
        arguments:
            $enableCustomObjectTypes: '%pim.catalog.enable_custom_object_types%'

    App\Catalog\Infrastructure\ApiPlatform\KindAwareSerializerContextBuilder:
        decorates: 'api_platform.serializer.context_builder'
        arguments:
            $decorated: '@.inner'

    # Context-scope decorator (#42 / 0.4.2). Wraps the KindAware decorator
    # so the chain is: AP4 default → KindAware (per-kind groups, opt-in)
    # → ContextScope (?context=integration|public override). Explicit
    # `decoration_priority: 10` keeps this on the outside even if more
    # decorators land on `api_platform.serializer.context_builder`.
    App\Catalog\Infrastructure\ApiPlatform\ContextScopeSerializerContextBuilder:
        decorates: 'api_platform.serializer.context_builder'
        decoration_priority: 10
        arguments:
            $decorated: '@.inner'

    # AP4 4.x XmlResourceExtractor returns paginationViaCursor as an
    # assoc array (`['id' => 'DESC']`) but the Hydra normalizer iterates
    # it as a list of `{field, direction}` dicts (#44 / 0.4.4). The
    # decorator below slots into the metadata factory chain and rewrites
    # the shape so every operation gets the canonical structure before
    # AP4 reads it. `decoration_priority: -10` runs after the cache
    # decorator so the result is cached.
    App\Catalog\Infrastructure\ApiPlatform\CursorPaginationFieldsNormalizer:
        decorates: 'api_platform.metadata.resource.metadata_collection_factory'
        decoration_priority: -10
        arguments:
            $decorated: '@.inner'

    # AP4 cursor pagination needs OrderFilter + RangeFilter pinned to the
    # cursor field (`id` for CatalogObject — Uuid v7 is monotonic so it
    # doubles as the chronological key). Both vendor classes are `final`,
    # so subclassing isn't an option — instead we wire concrete instances
    # parameterised with `properties` and reference them in the resource
    # XML by service id (`<filter>app.catalog.filter.order_by_id</filter>`).
    App\Catalog\Infrastructure\ApiPlatform\Filter\OrderById:
        class: ApiPlatform\Doctrine\Orm\Filter\OrderFilter
        autoconfigure: false
        autowire: false
        public: true
        tags: ['api_platform.filter']
        arguments:
            $managerRegistry: '@doctrine'
            $orderParameterName: 'order'
            $properties: { id: DESC }

    # Meilisearch client factory (#49 / 0.5.1). MEILI_URL + MEILI_KEY come
    # from docker-compose env (MEILI_KEY defaults to the dev master key).
    # `default::` env-resolver keeps cache-warmup happy when env isn't
    # injected (PHPStan CI boots the container without docker-compose).
    App\Search\Infrastructure\MeilisearchClientFactory:
        arguments:
            $url: '%env(default::MEILI_URL)%'
            $masterKey: '%env(default::MEILI_KEY)%'

    # Bind the named Flysystem storage for the Asset uploader. Without
    # this Symfony has multiple FilesystemOperator services (one per
    # named storage) and autowire can't pick. The named alias
    # `assets.storage` is created by flysystem-bundle.
    App\Asset\Application\AssetUploader:
        arguments:
            $assetsStorage: '@assets.storage'

    # IMP-02 (#443) — rules-based mapping dictionary loader. Cached for
    # 5 min in `cache.app` (see MappingDictionaryService). The dictionary
    # path lives under config/ so it ships with the container and never
    # needs to be writeable at runtime.
    App\Import\Application\Service\MappingDictionaryService:
        arguments:
            $dictionaryPath: '%pim.imports.dictionary_path%'
            $cache: '@cache.app'

    # IMP-04 (#445) — async import worker. Bind named storage so the
    # handler can pull the uploaded source file without autowire
    # confusion (multiple FilesystemOperator services, one per named
    # storage).
    App\Import\Application\Handler\ImportRunHandler:
        arguments:
            $importsStorage: '@imports.storage'

    App\Import\Presentation\Controller\StartImportController:
        arguments:
            $importsStorage: '@imports.storage'

    # EXP-06 (#585) — async export worker. Same named-storage binding so
    # the handler can write the generated XLSX/CSV to MinIO under
    # `<tenant_id>/<session_id>.<format>` (PRD §11.1).
    App\Export\Application\Async\ExportJobHandler:
        arguments:
            $exportsStorage: '@exports.storage'

    # VIEW-IMP-03 (#500) — health-check drivers for ImportSource. Only the
    # folder driver does a real probe in the MVP; sftp/ftp/http/webhook/
    # api/upload land with the polling daemon follow-up and use the
    # shared stub driver that simply returns "ok" with a note.
    App\Import\Application\Service\HealthCheck\FolderHealthCheckDriver:
        tags: ['app.import.health_check_driver']

    App\Import\Application\Service\HealthCheck\StubHealthCheckDriver:
        arguments:
            $types:
                - !php/const App\Import\Domain\Enum\ImportSourceType::Sftp
                - !php/const App\Import\Domain\Enum\ImportSourceType::Ftp
                - !php/const App\Import\Domain\Enum\ImportSourceType::Http
                - !php/const App\Import\Domain\Enum\ImportSourceType::Webhook
                - !php/const App\Import\Domain\Enum\ImportSourceType::Api
                - !php/const App\Import\Domain\Enum\ImportSourceType::Upload
        tags: ['app.import.health_check_driver']

    App\Import\Application\Service\HealthCheckService:
        arguments:
            $drivers: !tagged_iterator app.import.health_check_driver

    # IMP-06 (#447) — production runs against the local pgBackRest
    # binary; tests + CI use a stub via `when@test` (see services
    # block at the bottom of this file in test environment).
    App\Backup\Application\Service\BackupRunnerInterface:
        alias: App\Backup\Infrastructure\Service\PgBackRestRunner

    # API Configurator (#90 / 0.10.1). Argon2id hasher + key generator
    # — see ADR-0016 for the format and algorithm choice. The generator
    # reads `kernel.environment` to embed the four-letter forensic
    # segment (`live`/`dev`/`test`) in the raw key.
    App\ApiConfigurator\Domain\Service\ApiKeyHasherInterface:
        alias: App\ApiConfigurator\Infrastructure\Security\Argon2idApiKeyHasher

    App\ApiConfigurator\Application\ApiKeyGenerator:
        arguments:
            $environment: '%kernel.environment%'

    # BYOK Anthropic encryption (#107 / 0.11.12, ADR-0017). The master
    # key map is split out as a parameter so rotation = bump env var +
    # add the version to this map. Existing rows keep decrypting with
    # their original version until lazy-reencrypted on next read.
    App\Shared\Infrastructure\Crypto\AesGcmEncryptionService:
        arguments:
            $rawKeysByVersion:
                1: '%env(default::APP_BYOK_KEY_V1)%'

    App\Shared\Application\Crypto\EncryptionServiceInterface:
        alias: App\Shared\Infrastructure\Crypto\AesGcmEncryptionService

    # API Configurator (#94 / 0.10.5). Decorator chain wraps the
    # default + #41 KindAware + #42 ContextScope builders. Priority
    # 20 keeps it on the outside so the public-read groups override
    # any admin-side context the inner builders set up.
    App\ApiConfigurator\Infrastructure\ApiPlatform\ApiProfileSerializerContextBuilder:
        decorates: 'api_platform.serializer.context_builder'
        decoration_priority: 20
        arguments:
            $decorated: '@.inner'

    # Idempotent CREATE EXTENSION IF NOT EXISTS ltree on every kernel boot.
    # Migrations create the extension, but Zenstruck Foundry's ResetDatabase
    # rebuilds the test schema from ORM metadata bypassing migrations —
    # without this listener LTREE columns explode at schema:update time.
    # Listening on console.command is what catches the schema:update call
    # that Foundry runs during database reset.
    App\Catalog\Infrastructure\Doctrine\EventListener\PostgresExtensionLoader:
        tags:
            - { name: kernel.event_listener, event: kernel.request, priority: 4096 }
            - { name: kernel.event_listener, event: console.command, priority: 4096 }

    # UI-08.4 (#259) — bind the modeling cache pool to the
    # form-schema handler + invalidator. Pool is declared in
    # cache.yaml; binding here so autowiring picks it up via the
    # `$modelingCache` argument name without manual @-references.
    App\Catalog\Application\Query\GetObjectFormSchema\GetObjectFormSchemaHandler:
        arguments:
            $modelingCache: '@pim.modeling_cache'

    App\Catalog\Application\Query\Usage\UsageQueryService:
        arguments:
            $modelingCache: '@pim.modeling_cache'

    App\Catalog\Infrastructure\Doctrine\EventListener\ObjectFormSchemaCacheInvalidator:
        arguments:
            $modelingCache: '@pim.modeling_cache'

when@test:
    parameters:
        pim.refresh_token.cookie_secure: false

    services:
        # Mercure hub override for tests (#47 / 0.4.7). The real `Hub`
        # would HTTP-POST to the Mercure container during PHPUnit runs;
        # the in-memory hub captures Update objects so subscribers
        # exercise the real flush → dispatch → publish pipeline without
        # the network. Production / dev keep the real hub.
        App\Tests\Support\InMemoryMercureHub:
            public: true
            autowire: false
            autoconfigure: false

        # Override the autowire alias `HubInterface` (which AP4's
        # mercure-bundle wires to `mercure.hub.default` in dev/prod) so
        # MercurePublisher's constructor receives the in-memory hub. We
        # leave `mercure.hub.default` itself alone so the real-Hub
        # service registration stays valid (env vars referenced by
        # mercure.yaml continue to be "used").
        Symfony\Component\Mercure\HubInterface:
            alias: App\Tests\Support\InMemoryMercureHub
            public: true

        # IMP-06 (#447) — keep the pgbackrest CLI off the test box.
        # The stub honours the same contract so the handler flow
        # (mark running → run → mark completed/failed) is exercised
        # end-to-end through the messenger bus.
        App\Tests\Support\InMemoryBackupRunner:
            public: true
            autowire: false
            autoconfigure: false

        App\Backup\Application\Service\BackupRunnerInterface:
            alias: App\Tests\Support\InMemoryBackupRunner
            public: true
