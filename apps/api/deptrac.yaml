# Architectural fitness rules for the modular monolith — see ADR-0013.
#
# Each BC is split into two layers — Internals (Domain + Application +
# Infrastructure + Presentation) and Contracts (the public DTOs/events
# everyone outside the BC is allowed to reach for). Cross-BC depends_on
# only goes through the *_Contracts layer; Internals are private.
#
# Tooling-only directories (Benchmark, DataFixtures, Story) live in their
# own layer that is allowed to reach into anything — fixtures and the
# bulk-import benchmark legitimately do.
parameters:
    paths:
        - src
    exclude_files:
        - '#src/Kernel\.php#'
    layers:
        # ─── Catalog ───────────────────────────────────────────────────
        - name: Catalog_Internals
          collectors:
              - type: directory
                value: 'src/Catalog/Domain/.*'
              - type: directory
                value: 'src/Catalog/Application/.*'
              - type: directory
                value: 'src/Catalog/Infrastructure/.*'
              - type: directory
                value: 'src/Catalog/Presentation/.*'
        - name: Catalog_Contracts
          collectors:
              - type: directory
                value: 'src/Catalog/Contracts/.*'

        # ─── Channel ───────────────────────────────────────────────────
        - name: Channel_Internals
          collectors:
              - type: directory
                value: 'src/Channel/Domain/.*'
              - type: directory
                value: 'src/Channel/Application/.*'
              - type: directory
                value: 'src/Channel/Infrastructure/.*'
              - type: directory
                value: 'src/Channel/Presentation/.*'
        - name: Channel_Contracts
          collectors:
              - type: directory
                value: 'src/Channel/Contracts/.*'

        # ─── Asset ─────────────────────────────────────────────────────
        - name: Asset_Internals
          collectors:
              - type: directory
                value: 'src/Asset/Domain/.*'
              - type: directory
                value: 'src/Asset/Application/.*'
              - type: directory
                value: 'src/Asset/Infrastructure/.*'
              - type: directory
                value: 'src/Asset/Presentation/.*'
        - name: Asset_Contracts
          collectors:
              - type: directory
                value: 'src/Asset/Contracts/.*'

        # ─── Identity ──────────────────────────────────────────────────
        - name: Identity_Internals
          collectors:
              - type: directory
                value: 'src/Identity/Domain/.*'
              # AUD-053 (W3-1): all of Identity\Application EXCEPT the
              # carved-out CurrentTenantProvider, which lives in its own
              # single-class layer so Search can reach it without the whole
              # Internals surface. A token may only live in one layer.
              - type: bool
                must:
                    - type: directory
                      value: 'src/Identity/Application/.*'
                must_not:
                    - type: classNameRegex
                      value: '#^App\\Identity\\Application\\CurrentTenantProvider$#'
              - type: directory
                value: 'src/Identity/Infrastructure/.*'
              - type: directory
                value: 'src/Identity/Presentation/.*'
              # AUD-053 (W3-1): the OpenApi factory was unassigned to any
              # layer (deptrac debug:unassigned). It is an Identity-internal
              # API Platform decorator; fold it into the Internals layer so
              # every first-party Identity class is governed.
              - type: directory
                value: 'src/Identity/OpenApi/.*'
        # AUD-053 (W3-1): a single-class sub-layer carved out of Identity so
        # other BCs (Search) can reach the tenant resolver WITHOUT being
        # granted the whole Identity_Internals surface. CurrentTenantProvider
        # reads the security token (authenticated user / API-key principal /
        # non-prod env default) — the security-backed source the cross-tenant
        # search guard needs. The pending cleanup is moving it into
        # Shared\Application (see the RequestTenantSubscriber baseline note);
        # until then this is the minimum honest grant, not a broad allow.
        - name: Identity_TenantProvider
          collectors:
              - type: classNameRegex
                value: '#^App\\Identity\\Application\\CurrentTenantProvider$#'
        - name: Identity_Contracts
          collectors:
              - type: directory
                value: 'src/Identity/Contracts/.*'

        # ─── Shared (always reachable) ─────────────────────────────────
        - name: Shared
          collectors:
              - type: directory
                value: 'src/Shared/.*'

        # ─── Search (Meilisearch adapter — epic 0.5) ───────────────────
        - name: Search
          collectors:
              - type: directory
                value: 'src/Search/.*'

        # ─── Backup (pgBackRest snapshots — IMP-06) ────────────────────
        # AUD-079 (W3-1): the Backup BC shipped without any deptrac rules,
        # so all 12 of its classes were unassigned (debug:unassigned) and
        # every reach INTO it (ImportSession.backupSnapshot, BackupVoter)
        # was an unreported uncovered edge. Split it like every other BC —
        # Internals + a forward-compatible Contracts layer.
        - name: Backup_Internals
          collectors:
              - type: directory
                value: 'src/Backup/Domain/.*'
              - type: directory
                value: 'src/Backup/Application/.*'
              - type: directory
                value: 'src/Backup/Infrastructure/.*'
              - type: directory
                value: 'src/Backup/Presentation/.*'
        - name: Backup_Contracts
          collectors:
              - type: directory
                value: 'src/Backup/Contracts/.*'

        # ─── Forward-compatible BCs (empty today) ──────────────────────
        - name: Integration
          collectors:
              - type: directory
                value: 'src/Integration/.*'
        - name: Agent
          collectors:
              - type: directory
                value: 'src/Agent/.*'
        - name: ApiConfigurator
          collectors:
              - type: directory
                value: 'src/ApiConfigurator/.*'

        # ─── Vendor (third-party + PHP-internal classes) ───────────────
        # AUD-053 (W3-1): every dependency from a first-party class onto a
        # framework/library/PHP-internal class (Symfony, Doctrine, API
        # Platform, PSR, …) was previously counted as "Uncovered" — ~5.3k
        # silent edges that hid the handful of REAL first-party gaps among
        # them. This catch-all assigns "anything not under App\" to a named
        # Vendor layer that every BC is explicitly allowed to use, so the
        # uncovered count collapses to genuine first-party blind spots only.
        - name: Vendor
          collectors:
              - type: bool
                must_not:
                    - type: classNameRegex
                      value: '#^App\\#'

        # ─── Import / Export (ADR-0019, IMP2-1.1 #1463) ────────────────
        # Target ruleset: only *_Contracts + Shared. Existing reaches into
        # Catalog_Internals are baselined below and burned down by #1466.
        - name: Import
          collectors:
              - type: directory
                value: 'src/Import/.*'
        - name: Export
          collectors:
              - type: directory
                value: 'src/Export/.*'

        # ─── Tooling — fixtures, benchmarks, foundry stories, PHPStan rules ───
        - name: Tooling
          collectors:
              - type: directory
                value: 'src/Benchmark/.*'
              - type: directory
                value: 'src/DataFixtures/.*'
              - type: directory
                value: 'src/Story/.*'
              # RBAC-P1-010 (#649) — custom PHPStan rules. They reach
              # into Identity attribute classes to detect their presence
              # at static-analysis time; legitimate tooling cross-cut.
              - type: directory
                value: 'src/PHPStan/.*'

    ruleset:
        # AUD-053 (W3-1): `Vendor` appears in every ruleset below so that
        # framework / library / PHP-internal edges resolve to an allowed
        # layer instead of inflating the Uncovered count.
        Catalog_Internals:
            - Catalog_Contracts
            - Asset_Contracts
            - Channel_Contracts
            - Identity_Contracts
            - Shared
            - Vendor
        Catalog_Contracts:
            - Shared
            - Vendor

        Channel_Internals:
            - Channel_Contracts
            - Catalog_Contracts
            - Asset_Contracts
            - Identity_Contracts
            - Shared
            - Vendor
        Channel_Contracts:
            - Shared
            - Vendor

        Asset_Internals:
            - Asset_Contracts
            - Catalog_Contracts
            - Identity_Contracts
            - Shared
            - Vendor
        Asset_Contracts:
            - Shared
            - Vendor

        Import:
            - Catalog_Contracts
            - Channel_Contracts
            - Asset_Contracts
            - Identity_Contracts
            # AUD-079 (W3-1): ImportSession carries a `backupSnapshot`
            # many-to-one onto the Backup entity (IMP2-2.10 pre-import
            # snapshot badge). A Doctrine association needs the concrete
            # target-entity class, so this is a structural coupling that
            # cannot be hidden behind a Contracts interface; allow it
            # explicitly rather than baseline it as a violation.
            - Backup_Internals
            - Shared
            - Vendor
        Export:
            - Catalog_Contracts
            - Channel_Contracts
            - Asset_Contracts
            - Identity_Contracts
            - Shared
            - Vendor

        Identity_Internals:
            - Identity_Contracts
            - Catalog_Contracts
            # AUD-079 (W3-1): BackupVoter references the Backup entity it
            # protects — the same "voter references its resource" pattern
            # already accepted for ProductVoter / CategoryVoter / AssetVoter.
            - Backup_Internals
            # AUD-053 (W3-1): CurrentTenantProvider was carved out of this
            # layer; the audit listeners that still consume it reach back in
            # through its dedicated single-class layer.
            - Identity_TenantProvider
            - Shared
            - Vendor
        Identity_TenantProvider:
            - Shared
            - Vendor
        Identity_Contracts:
            - Shared
            - Vendor

        Shared:
            # Shared is normally a leaf. The exception is the RBAC attribute
            # contract — MetricsController carries #[NoPermissionRequired]
            # so the EndpointGuardListener can let the Prometheus scrape
            # through without RBAC. Identity_Contracts holds only the two
            # attribute classes (RequiresPermission + NoPermissionRequired),
            # which are pure metadata with zero runtime coupling.
            - Identity_Contracts
            - Vendor

        Search:
            - Shared
            - Catalog_Contracts
            - Catalog_Internals
            - Channel_Contracts
            - Identity_Contracts
            # AUD-079 (W3-1): narrowed from the whole Identity_Internals to
            # the single CurrentTenantProvider class the search tenant guard
            # actually uses (debug: it touches nothing else in Identity
            # Internals).
            - Identity_TenantProvider
            - Vendor

        Backup_Internals:
            - Backup_Contracts
            # AUD-079 (W3-1): Backup's only cross-BC reach is the current-user
            # port (CurrentUserProvider in Identity_Contracts) plus Shared —
            # the User-entity leak was removed via that seam in W3-1.
            - Identity_Contracts
            - Shared
            - Vendor
        Backup_Contracts:
            - Shared
            - Vendor

        Integration:
            - Shared
            - Catalog_Contracts
            - Channel_Contracts
            - Asset_Contracts
            - Identity_Contracts
            - Vendor

        Agent:
            - Shared
            - Catalog_Contracts
            - Identity_Contracts
            - Vendor

        ApiConfigurator:
            - Shared
            - Catalog_Contracts
            - Channel_Contracts
            - Asset_Contracts
            - Identity_Contracts
            - Vendor

        Tooling:
            - Catalog_Internals
            - Catalog_Contracts
            - Channel_Internals
            - Channel_Contracts
            - Asset_Internals
            - Asset_Contracts
            - Identity_Internals
            - Identity_Contracts
            - Shared
            - Import
            - Export
            - Vendor

    # Inline baseline of pre-existing cross-BC violations that the cleanup
    # tickets handle in follow-ups (see ADR-0013). Three clusters:
    #   1. Catalog\Domain enums (ObjectKind / AttributeType / Provenance)
    #      used by Catalog Contracts + Channel validator. Move them into
    #      Catalog\Contracts\Enum next.
    #   2. Shared\Infrastructure\Http\RequestTenantSubscriber depending on
    #      Identity\Application\CurrentTenantProvider. Cleanup: move
    #      CurrentTenantProvider into Shared\Application.
    # Every entry below is a TODO; new violations not in this list fail the
    # build through CI.
    #
    # AUD-053 (W3-1) burndown — the dominant cluster here is the repeated
    # `Identity\Domain\Entity\User` leak: ~17 controllers reached for the
    # concrete User entity just to read the authenticated principal's id /
    # tenant off the security token. W3-1 introduced the seam
    # `Identity\Contracts\Auth\CurrentUserProvider` and migrated the first
    # batch off it (Backup TriggerBackupController + 4 Import controllers:
    # ImportReportCsv, ImportThroughput, ListScheduleRuns, UpcomingSchedules),
    # deleting their baseline entries below. The remaining User-leak
    # controllers + the Export/Import → Catalog\Domain reaches stay baselined
    # and are tracked as the #1466 burndown follow-up — each migrates to the
    # same seam (User) or a Catalog Contracts seam, one controller at a time.
    skip_violations:
        App\Catalog\Application\DemoCatalogSeeder:
            - App\Asset\Domain\Entity\Asset
            - App\Asset\Domain\Entity\AssetVariant
        App\Catalog\Contracts\Event\ObjectCreated:
            - App\Catalog\Domain\ObjectKind
        App\Catalog\Contracts\Query\ObjectSummary:
            - App\Catalog\Domain\ObjectKind
        App\Catalog\Contracts\Query\ObjectTypeSummary:
            - App\Catalog\Domain\ObjectKind
        App\Shared\Infrastructure\Http\RequestTenantSubscriber:
            - App\Identity\Application\CurrentTenantProvider
        # RBAC-P3-002 (#665) — ProductVoter legitimately depends on
        # CatalogObject + ObjectKind because the Voter protects that
        # exact resource. Same reasoning as the existing CatalogObjectVoter
        # pattern. Phase 6 may move both enums into Catalog_Contracts;
        # this voter follows then.
        App\Identity\Infrastructure\Security\ProductVoter:
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\ObjectKind
        # RBAC-P3-003 (#666) — sibling voters under Prd\, same reasoning:
        # voters legitimately reference the resource class they protect.
        App\Identity\Infrastructure\Security\Prd\CategoryVoter:
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\ObjectKind
        App\Identity\Infrastructure\Security\Prd\AssetVoter:
            - App\Asset\Domain\Entity\Asset
        # RBAC-P3-004 (#667) — modeling-row voters under Prd\. Each Voter
        # legitimately references the resource class it protects.
        App\Identity\Infrastructure\Security\Prd\ObjectTypeVoter:
            - App\Catalog\Domain\Entity\ObjectType
        App\Identity\Infrastructure\Security\Prd\AttributeVoter:
            - App\Catalog\Domain\Entity\Attribute
        App\Identity\Infrastructure\Security\Prd\AttributeGroupVoter:
            - App\Catalog\Domain\Entity\AttributeGroup

        # 3. IMP2-1.1 (#1463): Import/Export layers added with target ruleset
        #    (*_Contracts + Shared only). Existing reaches into Catalog/Channel/
        #    Identity internals + Identity voters importing Import entities are
        #    baselined here; #1466 (shared writer core) burns the bulk down.
        App\Export\Application\Builder\ExportBuilder:
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectValue
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectCategoryRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectRelationRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectValueRepositoryInterface
        App\Export\Application\Builder\Structural\AttributesGroupsExportBuilder:
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\AttributeGroupAttribute
            - App\Catalog\Domain\Entity\ObjectTypeAttribute
            - App\Catalog\Domain\Repository\AttributeOptionRepositoryInterface
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Channel\Domain\Repository\TenantLocaleRepositoryInterface
        App\Export\Application\Builder\Structural\CategoriesExportBuilder:
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
            - App\Catalog\Domain\Repository\CategoryAttributeGroupRepositoryInterface
            - App\Channel\Domain\Repository\TenantLocaleRepositoryInterface
        App\Export\Application\Builder\Structural\ModuleSchemaExportBuilder:
            - App\Catalog\Domain\Entity\AttributeGroup
            - App\Catalog\Domain\Entity\AttributeGroupAttribute
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Entity\ObjectTypeAttributeGroup
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Export\Application\Builder\ValueSerializer:
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\ObjectValue
        App\Export\Application\Sync\SyncExportRunner:
            - App\Catalog\Application\Filter\FilterDslResolver
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Export\Presentation\Controller\ExportPreflightController:
            - App\Catalog\Application\Filter\FilterDslResolver
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Export\Presentation\Support\ExportEntityTypeResolver:
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Identity\Infrastructure\Security\ImportProfileVoter:
            - App\Import\Domain\Entity\ImportProfile
        App\Identity\Infrastructure\Security\ImportScheduleVoter:
            - App\Import\Domain\Entity\ImportSchedule
        App\Identity\Infrastructure\Security\ImportSessionVoter:
            - App\Import\Domain\Entity\ImportSession
        App\Identity\Infrastructure\Security\ImportSourceVoter:
            - App\Import\Domain\Entity\ImportSource
        # IMP2-1.8 (#1471) two-pass relation/parent linker
        App\Import\Application\Service\RelationImportStep:
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectRelation
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectRelationRepositoryInterface
        App\Import\Application\Service\ImportObjectCreator:
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectCategory
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Provenance
            - App\Catalog\Application\BatchValueWriter
        # #1718 — option auto-create mints AttributeOption via the same
        # Import→Catalog seam as ImportObjectCreator (it owns the select cell).
        App\Import\Application\Service\OptionAutoCreator:
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\AttributeOption
            - App\Catalog\Domain\Repository\AttributeOptionRepositoryInterface
        # #1728 — attribute auto-create mints Attribute + ObjectTypeAttribute via
        # the same Import→Catalog seam as ImportObjectCreator.
        App\Import\Application\Service\AttributeAutoCreator:
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Entity\ObjectTypeAttribute
        # Structural import (attribute / attribute-group definitions) upserts
        # configuration entities through the Catalog CQRS commands + the shared
        # idempotent assignment service — the same Import→Catalog seam as the
        # CatalogObject importer, baselined here pending the #1466 burndown.
        App\Import\Application\Service\Structural\AttributeImportCreator:
            - App\Catalog\Application\Command\CreateAttribute\CreateAttributeCommand
            - App\Catalog\Application\Command\UpdateAttribute\UpdateAttributeCommand
            - App\Catalog\Application\ObjectTypeService
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\AttributeGroup
            - App\Catalog\Domain\Entity\AttributeGroupAttribute
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\AttributeGroupRepositoryInterface
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Import\Application\Service\Structural\AttributeOptionImporter:
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\AttributeOption
            - App\Catalog\Domain\Repository\AttributeOptionRepositoryInterface
        # IMP2-2.4 — undo-log capture + rollback v2 reuse Catalog read/rebuild/
        # reindex via the same Import→Catalog seam as ImportObjectCreator.
        App\Import\Application\Service\ImportUndoLogger:
            - App\Catalog\Application\ValueWriteCore
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectValue
            - App\Catalog\Domain\Repository\ObjectValueRepositoryInterface
        App\Import\Application\Service\ImportRollbackService:
            - App\Catalog\Application\AttributesIndexedRebuilder
            - App\Catalog\Application\Reindex\BulkReindexQueueInterface
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Entity\ObjectValue
            - App\Catalog\Domain\Provenance
            - App\Catalog\Domain\Repository\ObjectValueRepositoryInterface
        App\Import\Application\Service\ImportValidationService:
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
        App\Import\Domain\Entity\ImportProfile:
            - App\Catalog\Domain\Entity\ObjectType
        App\Import\Domain\Entity\ImportSession:
            - App\Catalog\Domain\Entity\ObjectType
        App\Import\Infrastructure\ApiPlatform\State\ImportProfileProcessor:
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
            - App\Identity\Domain\Entity\User
        App\Import\Infrastructure\ApiPlatform\State\ImportScheduleProcessor:
            - App\Identity\Domain\Entity\User
        App\Import\Infrastructure\ApiPlatform\State\ImportSourceProcessor:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\AutoMapController:
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\ObjectTypeAttributeRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
        App\Import\Presentation\Controller\DuplicateImportProfileController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ExportImportProfileController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\GetImportSessionController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ImportImportProfileController:
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ImportSessionStateController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ListImportSessionsController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ParsePreviewController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\RollbackImportController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ScheduleStateController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\StartImportController:
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
            - App\Identity\Domain\Entity\User
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
        App\Import\Presentation\Controller\StartStructuralImportController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\TestImportSourceConnectionController:
            - App\Identity\Domain\Entity\User
        App\Import\Presentation\Controller\ValidateDryRunController:
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\ObjectTypeRepositoryInterface
            - App\Identity\Domain\Entity\User
        # IMP2-1.4 (#1466) writer touchpoint; IMP2-1.7 (#1470) category +
        # status/enabled write — per-chunk category resolve + replace/append.
        App\Import\Application\Handler\ImportRunHandler:
            - App\Catalog\Application\BatchValueWriter
            # IMP2-2.6 (#1482) bulk path — suppress the per-flush sync rebuild
            # via BulkContext and dispatch the async attributes_indexed rebuild;
            # part of the #1466 Import → Catalog_Internals burndown.
            - App\Catalog\Application\BulkContext
            - App\Catalog\Application\Message\ObjectValuesChangedMessage
            - App\Catalog\Domain\AttributeType
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectCategory
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\ObjectKind
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectCategoryRepositoryInterface
            # IMP2-1.8 galleries — per-chunk asset existence prefetch
            - App\Asset\Domain\Repository\AssetRepositoryInterface
        # IMP2-1.12 media — the download handler writes the {asset_id} envelope
        # + links assets. Asset INGEST is clean via Asset\Contracts; the value
        # write reuses the same Catalog-domain touchpoints as ImportRunHandler.
        App\Import\Application\Handler\ImageDownloadHandler:
            - App\Catalog\Domain\Entity\Attribute
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectValue
            - App\Catalog\Domain\Provenance
            - App\Catalog\Domain\Repository\AttributeRepositoryInterface
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
            - App\Catalog\Domain\Repository\ObjectValueRepositoryInterface
            - App\Asset\Domain\Repository\AssetRepositoryInterface
        # IMP2-1.4 (#1466) writer touchpoint
        App\Import\Application\Service\CreatedImportObject:
            - App\Catalog\Domain\Entity\CatalogObject
        # IMP2-1.4 (#1466) writer touchpoint
        App\Import\Application\Service\ObjectResolver:
            - App\Catalog\Domain\Entity\CatalogObject
            - App\Catalog\Domain\Entity\ObjectType
            - App\Catalog\Domain\Repository\CatalogObjectRepositoryInterface
