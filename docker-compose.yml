# PIM stack — single-origin via the `caddy` edge service. See docker/caddy/Caddyfile.
#
# `pnpm dev` (root package.json) starts the frontend through Turborepo; this stack
# brings up everything PHP / data / search / mail / auto-cert via `pnpm stack:up`.
#
# Architectural decisions:
# - FrankenPHP worker mode (Sprint 0 ticket 0.0.13 benchmark validates EntityManager::clear pattern).
# - No CORS bundle. Single-origin enforced at edge (lessons.md "Sieć / dev environment").
# - All long-lived data lives in named volumes. .docker/data/ bind mounts are kept out
#   of the synced Synology folder by the .gitignore rule.

name: pim

x-default-restart: &default_restart
  restart: unless-stopped

# HARD-02 — dev-machine resource limits.
#
# CLAUDE.md §3.10 calls out FrankenPHP worker mode as the highest memory-leak
# risk in the stack: Doctrine Identity Map accumulates between requests and a
# missing EntityManager::clear() inside a long-running handler can OOM the
# whole worker pool. Without `deploy.resources.limits` the worker can swallow
# the entire host memory before the leak surfaces in metrics.
#
# Limits below are tuned for a 16 GB dev workstation (sum ≈ 6 GB across all
# services; leaves headroom for editor + browser). Production overrides land
# in docker-compose.prod.yml (separate ticket — Faza 1 deploy hardening) and
# should pair with a Prometheus alert on `frankenphp_worker_memory_bytes >
# 256MB` per CLAUDE.md §3.10.
#
# Compose Spec (v3+) supports `deploy.resources.limits` outside Swarm since
# 2022 — Docker Desktop 4.x and `docker compose` v2 both honour it.
x-resource-limits-api: &resource_limits_api
  deploy:
    resources:
      limits:
        memory: 1024M
        cpus: "2.0"

x-resource-limits-db: &resource_limits_db
  deploy:
    resources:
      limits:
        memory: 2048M
        cpus: "2.0"

x-resource-limits-search: &resource_limits_search
  deploy:
    resources:
      limits:
        memory: 1024M
        cpus: "1.0"

x-resource-limits-admin: &resource_limits_admin
  deploy:
    resources:
      limits:
        memory: 1024M
        cpus: "1.0"

x-resource-limits-cache: &resource_limits_cache
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: "0.5"

x-resource-limits-storage: &resource_limits_storage
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "1.0"

x-resource-limits-edge: &resource_limits_edge
  deploy:
    resources:
      limits:
        memory: 128M
        cpus: "0.5"

x-resource-limits-tiny: &resource_limits_tiny
  deploy:
    resources:
      limits:
        memory: 128M
        cpus: "0.25"

services:
  # ─── Edge: terminates TLS + routes single-origin traffic ──────────────────
  caddy:
    image: caddy:2-alpine
    <<: [*default_restart, *resource_limits_edge]
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_started
      mercure:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      # Caddy listens on :443 only (single-origin HTTPS); the healthcheck has
      # to negotiate TLS to reach /api. Self-signed cert from the local CA is
      # accepted with --no-check-certificate.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/api"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ─── Symfony / API Platform / FrankenPHP worker mode ──────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    <<: [*default_restart, *resource_limits_api]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-ChangeMeBeforeDeploy}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
      # Synchronous Messenger transport for local development — no worker
      # pool runs inside this stack, so async-routed messages execute
      # in-band when dispatched. Production deployments override to
      # `doctrine://default?queue_name=async` so the FrankenPHP worker
      # pool drains the queue (audit MEDIUM-007).
      MESSENGER_TRANSPORT_DSN: sync://
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: https://pim.localhost/.well-known/mercure
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:-!ChangeMercureKeyAtLeast256BitsLong!}
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_MASTER_KEY:-masterKeyPleaseChangeMe}
      TRUSTED_PROXIES: 127.0.0.1,REMOTE_ADDR
      TRUSTED_HOSTS: '^pim\.localhost$$|^localhost$$|^api$$'
      # CI sentinel — propagated from GitHub Actions so docker-entrypoint.sh
      # can skip the dev seed guard (Playwright workflow drives migrations
      # itself, see apps/api/docker-entrypoint.sh).
      CI: ${CI:-}
    expose:
      - "80"
    # Live-mount the source tree so iterating on PHP code does not require a
    # `docker compose build api` round-trip. var/cache and var/log are kept
    # inside the image (the bind mount excludes them via the .dockerignore +
    # Symfony env writing into the project) — anonymous named volumes shadow
    # the host paths so the worker keeps a working cache. Vendor stays in the
    # image so package upgrades go through `composer require` followed by a
    # rebuild rather than mutating the host node-style.
    volumes:
      - ./apps/api:/app
      - api_var:/app/var
      - api_vendor:/app/vendor
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/api"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s

  # ─── Frontend admin (Vite dev server) ─────────────────────────────────────
  admin:
    image: node:22-alpine
    <<: [*default_restart, *resource_limits_admin]
    working_dir: /workspace/apps/admin
    command: sh -c "corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install --frozen-lockfile=false && pnpm dev"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/workspace
      - admin_node_modules:/workspace/node_modules
      - admin_app_node_modules:/workspace/apps/admin/node_modules
    expose:
      - "5173"

  # ─── PostgreSQL 16 + pgBackRest (Sprint 0 stub, ticket #15) ───────────────
  # Custom image bakes pgbackrest + dcron into postgres:16-alpine so:
  #   - archive_command pushes WAL straight to MinIO (continuous archiving)
  #   - the hourly cron entry runs `pgbackrest backup --stanza=pim`
  #   - the initial stanza-create + full backup run in the background once
  #     postgres is ready (pim-init-backup.sh, fired from start-pim.sh)
  # Production schedule (weekly full + daily diff + 5-min WAL + automated weekly
  # restore test) lands in 0.11.11 — see docs/runbook/restore.md.
  database:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    image: pim-database:local
    <<: [*default_restart, *resource_limits_db]
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      minio-tls:
        condition: service_started
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      PGBACKREST_STANZA: pim
      PGBACKREST_REPO1_S3_KEY: ${MINIO_ROOT_USER:-minioadmin}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
    # archive_mode + archive_command are server-level GUCs that have to be
    # passed at every postgres start. Putting them on the command line keeps
    # them visible here instead of hidden inside the data directory's
    # postgresql.auto.conf. wal_level=replica is the minimum required for
    # archiving + future replication; max_wal_senders > 0 keeps the door open
    # for pg_basebackup-style probes from pgBackRest.
    command:
      - "postgres"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=pgbackrest --stanza=pim archive-push %p"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=3"
      - "-c"
      - "archive_timeout=60"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ─── Redis 7 (Symfony Messenger transport + cache) ────────────────────────
  redis:
    image: redis:7-alpine
    <<: [*default_restart, *resource_limits_cache]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Meilisearch (search) ─────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.13
    <<: [*default_restart, *resource_limits_search]
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKeyPleaseChangeMe}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    expose:
      - "7700"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible object storage for assets, backups) ─────────────
  minio:
    image: minio/minio:latest
    <<: [*default_restart, *resource_limits_storage]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── MinIO TLS terminator (pgBackRest → MinIO) ────────────────────────────
  # pgBackRest 2.57 hard-codes HTTPS for S3 repos. This Caddy sidecar adds TLS
  # in front of MinIO so the database container can use a single S3 endpoint
  # without bringing TLS into the main MinIO config. See docs/runbook/restore.md
  # and docker/caddy/Caddyfile.minio.
  minio-tls:
    image: caddy:2-alpine
    <<: [*default_restart, *resource_limits_tiny]
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./docker/caddy/Caddyfile.minio:/etc/caddy/Caddyfile:ro
      - minio_tls_data:/data
      - minio_tls_config:/config
    expose:
      - "443"

  # Initialise required buckets the first time the stack comes up.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb -p local/pim-assets || true;
      mc mb -p local/pim-backups || true;
      mc mb -p local/pim-imports || true;
      mc mb -p local/pim-exports || true;
      mc anonymous set download local/pim-assets || true;
      mc ilm rule add --expire-days 7 local/pim-imports || true;
      "
    restart: "no"

  # ─── Mercure (SSE hub) ────────────────────────────────────────────────────
  mercure:
    image: dunglas/mercure:latest
    <<: [*default_restart, *resource_limits_edge]
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMercureKeyAtLeast256BitsLong!}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-!ChangeMercureKeyAtLeast256BitsLong!}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins https://pim.localhost https://localhost
        anonymous
    expose:
      - "80"
    volumes:
      - mercure_data:/data
      - mercure_config:/config

  # ─── k6 (HTTP load tester) — perf profile only ────────────────────────────
  # Activated explicitly with `--profile perf` and never starts as part of
  # `pnpm stack:up`. The wrapper at scripts/perf-list-products.sh orchestrates
  # the login + seed + k6 + cleanup flow used by ticket 0.0.14 (load test
  # /api/products?page=1, p95 < 200 ms target). network_mode: service:caddy
  # gives k6 the same DNS view as the edge so https://pim.localhost works
  # against the same self-signed cert the rest of the stack uses.
  k6:
    image: grafana/k6:latest
    profiles: ["perf"]
    network_mode: "service:caddy"
    volumes:
      - ./tools/perf:/scripts:ro
    entrypoint: ["k6"]

  # ─── Mailpit (dev mail catcher) ───────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    <<: [*default_restart, *resource_limits_tiny]
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    expose:
      - "1025"
      - "8025"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
  minio_tls_data:
  minio_tls_config:
  mercure_data:
  mercure_config:
  admin_node_modules:
  admin_app_node_modules:
  api_var:
  api_vendor:
