# PIM stack — production overlay.
#
# Apply on top of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Scope of this file:
#   - Switches the API container to `APP_ENV=prod` and re-points the Symfony
#     Messenger DSN at the Doctrine queue so async-routed messages
#     (ObjectValuesChangedMessage, AssetThumbnailsRequested, ImportRunMessage,
#     BackupSnapshotMessage) drain via the worker pool below instead of
#     blocking the HTTP request thread.
#   - Adds a dedicated `worker` service that runs `messenger:consume async import`
#     with a per-process memory cap. Replicas scale the pool horizontally
#     without touching the web container.
#
# PROD-01: This overlay is the prerequisite for shipping bulk operations to
# production — without it any handler routed to the `async` transport
# executes inline (sync://) on the request thread, which means a 50k SKU
# import or 10k bulk price update keeps the HTTP connection open for the
# entire job duration.
#
# Subsequent overlays (kept in this same file for a single-source prod
# topology):
#   - PROD-02 (THIS FILE): PgBouncer in transaction mode in front of Postgres.
#   - PROD-04 (THIS FILE): Prometheus + Alertmanager scraping the existing
#     /api/metrics endpoint with the FrankenPHP worker-memory alert
#     CLAUDE.md §3.10 demands.
#
# PROD-02 detail:
# Without PgBouncer, every FrankenPHP / messenger worker holds a long-lived
# Postgres connection. With 3 web workers × 10 conn baseline + 2 messenger
# workers × 5 conn + 1 cron import worker the connection count drifts above
# Postgres' default `max_connections=100` under modest load. PgBouncer in
# transaction mode multiplexes ~200 client connections onto ~25 backend
# connections, which fits inside Postgres limits with headroom for admin
# and replication slots.
#
# Doctrine ORM 3 + DBAL 4 issues an extended-query-protocol prepared
# statement for every parameterised query. PgBouncer 1.21+ supports
# protocol-level prepared statements in transaction mode when
# `max_prepared_statements` is non-zero — that knob is set below to 100,
# matching the per-worker working set. Without it the first parameterised
# query after a backend re-pin would fail with
# `prepared statement "..." does not exist`.

name: pim

services:
  api:
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      # AUD-009 (W1-4) — fail-loud in prod. The base compose carries dev-only
      # `${VAR:-default}` fallbacks so the stack boots out-of-the-box locally.
      # In production a missing secret MUST abort `docker compose config|up`
      # (the alertmanager service already uses this pattern) rather than
      # silently booting with a well-known default. `${VAR:?message}` makes
      # Compose exit non-zero with the message when VAR is unset/empty.
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required in prod — generate with `php -r 'echo bin2hex(random_bytes(16));'` and set it (no default). See .env.prod.example.}
      # Async transport via Doctrine — handlers routed `async` enqueue here
      # and the `worker` service below drains them. Keeps HTTP request
      # threads free of long-running work.
      MESSENGER_TRANSPORT_DSN: doctrine://default?queue_name=async&auto_setup=0
      # PROD-02: re-route the web tier through PgBouncer (port 6432) so the
      # process pool multiplexes onto a small backend connection pool.
      # AUD-009 — POSTGRES_PASSWORD fail-loud (DSN embeds the credential).
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod (no default).}@pgbouncer:6432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8&application_name=pim_api
      # PROD-05: shared lock store across the api + worker pools. The base
      # file uses 'flock', which only works inside a single container — a
      # Messenger worker container would never see a lock acquired by the
      # api container. Redis is already part of the base stack.
      LOCK_DSN: redis://redis:6379
      # AUD-009 — the base `api` block also sets DATABASE_URL_OWNER (migrations
      # DDL connection, role `pim`), MERCURE_JWT_SECRET and MEILI_KEY with
      # dev `:-default` fallbacks. The prod overlay does not otherwise touch
      # them, so they would inherit the dev defaults. Re-declare fail-loud.
      DATABASE_URL_OWNER: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod (no default).}@pgbouncer:6432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8&application_name=pim_migrations
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required in prod — min 256 bits, e.g. `openssl rand -hex 32` (no default).}
      MEILI_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required in prod — `openssl rand -base64 32` (no default).}

  # ─── Symfony Messenger worker pool ────────────────────────────────────────
  #
  # One container per worker process. `replicas: 2` is the default — bump via
  # `docker compose -f ... -f docker-compose.prod.yml up -d --scale worker=N`
  # when bulk job throughput needs more headroom.
  #
  # Memory + time limits guard against:
  #   - Doctrine Identity Map accumulation (CLAUDE.md §3.10) — `--memory-limit
  #     256M` exits the worker before the FrankenPHP-style leak escalates.
  #   - long-running PHP processes drifting from the latest deploy — `--time-
  #     limit 3600` recycles every hour so a redeploy plus container restart
  #     guarantees the new code is in the next message handler within ≤1h
  #     even if no SIGTERM reaches the container.
  #
  # supervisor-on-exit pattern: `restart: unless-stopped` plus the worker's
  # own `--memory-limit` / `--time-limit` produces a clean PID 1 exit + Docker
  # restart cycle. No supervisor / runit needed — Docker is the supervisor.
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      # AUD-009 (W1-4) — fail-loud: same secrets as the api container, no
      # dev `:-default` fallbacks in prod.
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required in prod — generate with `php -r 'echo bin2hex(random_bytes(16));'` and set it (no default). See .env.prod.example.}
      # PROD-02: route all PHP traffic through PgBouncer (transaction pool
      # at port 6432). serverVersion=16 keeps DBAL 4 from issuing a
      # `SHOW server_version` query at boot — that query inside PgBouncer
      # transaction mode would land on a fresh backend each time.
      # application_name shows up in pg_stat_activity for triage.
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod (no default).}@pgbouncer:6432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8&application_name=pim_api
      MESSENGER_TRANSPORT_DSN: doctrine://default?queue_name=async&auto_setup=0
      # PROD-05: same shared lock store as the api container so the
      # worker sees locks acquired by inline imports and vice-versa.
      LOCK_DSN: redis://redis:6379
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL:-https://pim.localhost/.well-known/mercure}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required in prod — min 256 bits, e.g. `openssl rand -hex 32` (no default).}
      MERCURE_TOPIC_BASE: ${MERCURE_TOPIC_BASE:-https://pim.localhost}
      MEILI_URL: http://meilisearch:7700
      MEILI_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required in prod — `openssl rand -base64 32` (no default).}
    # Worker entrypoint: drain `async` then exit cleanly. Docker restarts the
    # container, the loop continues. Two distinct exit triggers:
    #   --memory-limit 256M : PHP self-checks RSS after each handle, exits 0
    #                         when crossed (Symfony Messenger built-in).
    #   --time-limit 3600   : exits 0 after 1h regardless — guarantees fresh
    #                         code picks up within an hour of a deploy.
    # `--failure-limit 5` stops a poison message from looping forever; failed
    # envelopes route to the `failed` transport configured in messenger.yaml.
    command:
      - "php"
      - "bin/console"
      - "messenger:consume"
      - "async"
      - "import"
      - "--memory-limit=256M"
      - "--time-limit=3600"
      - "--failure-limit=5"
      - "-vv"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    volumes:
      - api_var:/app/var

  # In production the frontend is a built artifact (apps/admin/dist) served by
  # Caddy as static files, not the Vite dev server. We park `admin` under a
  # `dev-only` profile so the prod overlay does not start it. Caddy's base
  # depends_on references `admin` though, so we re-declare caddy's depends_on
  # with `!override` to drop the dev dependency without re-stating the rest
  # of the caddy block. The Caddyfile that ships with the release image
  # handles `file_server` for the SPA bundle (separate prod deploy ticket
  # tracks the Caddyfile + image build pipeline).
  admin:
    profiles: ["dev-only"]

  # AUD-046 (S) — Mailpit is a dev mail catcher (SMTP sink + web UI). It must
  # never run in production, where MAILER_DSN points at a real SMTP relay.
  # Same mechanism as `admin`: parked under the `dev-only` profile here in the
  # prod overlay so a default prod `up` (no `--profile dev-only`) skips it,
  # while the base compose keeps Mailpit profile-free so `pnpm stack:up` (dev)
  # starts it out-of-the-box. Verified: `docker compose config` (no overlay)
  # lists mailpit; the prod overlay config does not.
  mailpit:
    profiles: ["dev-only"]

  caddy:
    depends_on: !override
      api:
        condition: service_healthy
      mercure:
        condition: service_started

  # ─── Data-layer secret hardening (AUD-009 / W1-4) ─────────────────────────
  #
  # These services live in the base compose with dev-only `${VAR:-default}`
  # fallbacks so `pnpm stack:up` boots out-of-the-box. The base file is left
  # untouched (dev must keep working). The blocks below re-declare ONLY the
  # secret-bearing environment keys as `${VAR:?message}` so a prod
  # `docker compose config|up` with an unset secret aborts non-zero instead of
  # silently booting on a well-known credential. Compose deep-merges these
  # `environment` maps over the base service, so non-secret keys (commands,
  # volumes, healthchecks, archive GUCs) are inherited unchanged.
  database:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod (no default).}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required in prod — runtime role password (no default).}
      # AUD-018 (W1-6) — anti-SPOF: in prod the pgBackRest repo MUST live on a
      # MinIO/S3 endpoint SEPARATE from the one serving DAM assets, so an
      # assets-storage failure can never take the database backups with it.
      # pgBackRest reads these PGBACKREST_* env vars at runtime and they win over
      # the baked-in pgbackrest.conf, so the repo can be redirected to a separate
      # instance / region / S3 account WITHOUT rebuilding the database image:
      #   PGBACKREST_REPO1_S3_ENDPOINT — host of the dedicated backup MinIO/S3
      #   PGBACKREST_REPO1_S3_BUCKET   — dedicated repo bucket on that endpoint
      #   PGBACKREST_REPO1_S3_KEY / _KEY_SECRET — credentials for THAT account
      # Defaults below keep the dev topology (bucket-level separation on the same
      # MinIO) working if the operator has not yet provisioned a second store;
      # production deploys SHOULD set the dedicated endpoint. The fail-loud
      # secrets stay required.
      PGBACKREST_REPO1_S3_ENDPOINT: ${PGBACKREST_REPO1_S3_ENDPOINT:-minio-tls}
      PGBACKREST_REPO1_S3_BUCKET: ${PGBACKREST_REPO1_S3_BUCKET:-pim-pgbackrest}
      PGBACKREST_REPO1_S3_KEY: ${PGBACKREST_REPO1_S3_KEY:?PGBACKREST_REPO1_S3_KEY is required in prod — credentials for the dedicated backup store (no default).}
      PGBACKREST_REPO1_S3_KEY_SECRET: ${PGBACKREST_REPO1_S3_KEY_SECRET:?PGBACKREST_REPO1_S3_KEY_SECRET is required in prod — credentials for the dedicated backup store (no default).}

  meilisearch:
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required in prod — `openssl rand -base64 32` (no default).}
      MEILI_NO_ANALYTICS: "true"
      # AUD-046 (S) — the base compose runs Meilisearch with MEILI_ENV
      # `development`, which disables the master-key requirement, serves the
      # bundled search preview UI and verbose logs. Production MUST run
      # `MEILI_ENV: production` so the master key is enforced and the dev UI
      # is disabled.
      MEILI_ENV: production

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in prod (no default).}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in prod (no default).}

  # minio-init re-runs `mc alias set` with the root credentials; same fail-loud.
  # The entrypoint references ${MINIO_ROOT_USER}/${MINIO_ROOT_PASSWORD} inline,
  # so the override is on the *service environment* the entrypoint reads.
  #
  # AUD-018 (W1-6) — the base minio-init enables bucket versioning on the durable
  # buckets (pim-assets, pim-pgbackrest, pim-exports). That survives an
  # accidental object delete/overwrite but NOT loss of the whole MinIO instance.
  # Two production-only follow-ups give true off-site durability; both are
  # documented in docs/runbook/disaster-recovery.md → "MinIO disaster recovery":
  #   1. Dedicated backup store — point the database service's
  #      PGBACKREST_REPO1_S3_ENDPOINT/_BUCKET at a SEPARATE MinIO/S3 region so the
  #      pgBackRest repo and the DAM assets cannot fail together.
  #   2. Asset replication — run scripts/minio-mirror-assets.sh on a cron / a
  #      MinIO bucket-replication rule to copy pim-assets to that second region.
  #      A `mirror-assets` sidecar (commented below) is the wiring template.
  minio-init:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in prod (no default).}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in prod (no default).}

  # ─── Asset off-site replication (AUD-018 / W1-6) ──────────────────────────
  # Periodically mirrors the DAM assets bucket to a SEPARATE MinIO/S3 region so
  # assets survive loss of the primary `minio_data` volume (versioning alone
  # only protects against object-level delete/overwrite, not volume loss).
  #
  # Disabled by default (profile `dr`) because it needs a real second store:
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
  #     --profile dr up -d mirror-assets
  # Provide the replica endpoint + credentials in the deployment env. Prefer a
  # bucket-scoped service account on the replica, NOT its root credentials.
  # For a fully managed alternative, configure a native MinIO bucket-replication
  # rule (`mc replicate add`) instead of this poll-based sidecar.
  mirror-assets:
    image: minio/mc:latest
    profiles: ["dr"]
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MIRROR_SOURCE_URL: http://minio:9000
      MIRROR_SOURCE_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required in prod (no default).}
      MIRROR_SOURCE_SECRET: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in prod (no default).}
      MIRROR_SOURCE_BUCKET: pim-assets
      MIRROR_TARGET_URL: ${MIRROR_TARGET_URL:?MIRROR_TARGET_URL is required for asset replication — endpoint of the SECOND MinIO/S3 region (no default).}
      MIRROR_TARGET_KEY: ${MIRROR_TARGET_KEY:?MIRROR_TARGET_KEY is required for asset replication (no default).}
      MIRROR_TARGET_SECRET: ${MIRROR_TARGET_SECRET:?MIRROR_TARGET_SECRET is required for asset replication (no default).}
      MIRROR_TARGET_BUCKET: ${MIRROR_TARGET_BUCKET:-pim-assets-replica}
      # --watch keeps the mirror live (event-driven) instead of one-shot.
      MIRROR_WATCH: "1"
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/minio-mirror-assets.sh"]

  mercure:
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required in prod — min 256 bits, e.g. `openssl rand -hex 32` (no default).}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:?MERCURE_JWT_SECRET is required in prod — min 256 bits, e.g. `openssl rand -hex 32` (no default).}

  # ─── PgBouncer (transaction-mode connection pooler) ───────────────────────
  #
  # PROD-02. edoburu/pgbouncer image renders pgbouncer.ini + userlist.txt
  # from environment variables — no bind-mounted config file needed for the
  # baseline pool (single-database, single-user). Custom users / multi-db
  # setups would mount /etc/pgbouncer/userlist.txt.
  #
  # Knob choice:
  #   - POOL_MODE=transaction       → release the backend on COMMIT/ROLLBACK
  #   - MAX_CLIENT_CONN=200         → matches FrankenPHP worker count budget
  #   - DEFAULT_POOL_SIZE=25        → ~25 backend conns per (db,user) pair
  #   - RESERVE_POOL_SIZE=5         → burst headroom under brief spikes
  #   - MAX_PREPARED_STATEMENTS=100 → enables protocol-level PS in tx mode
  #                                   (PgBouncer ≥1.21). Doctrine DBAL 4
  #                                   relies on PS for every parameterised
  #                                   query — without this, transaction mode
  #                                   breaks on the second handler invocation.
  #
  # Backend connection auth uses the same credentials as the API. AUTH_TYPE
  # defaults to scram-sha-256 (matches Postgres 16 defaults). Postgres'
  # `pg_hba.conf` accepts scram from inside the docker network — see
  # docker/postgres/Dockerfile if customising auth methods.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    # YAML anchors live in the base compose file; overlay files can't dereference
    # them so we restate restart policy + resource caps inline.
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_USER: ${POSTGRES_USER:-app}
      # AUD-009 (W1-4) — fail-loud: PgBouncer authenticates to the Postgres
      # backend with the real password; no dev default in prod.
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod (no default).}
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-app}
      LISTEN_PORT: "6432"
      LISTEN_ADDR: "0.0.0.0"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "25"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_QUERY: "DISCARD ALL"
      MAX_PREPARED_STATEMENTS: "100"
      AUTH_TYPE: scram-sha-256
      ADMIN_USERS: ${POSTGRES_USER:-app}
      IGNORE_STARTUP_PARAMETERS: "extra_float_digits,search_path,application_name"
    expose:
      - "6432"
    healthcheck:
      # pgbouncer doesn't ship pg_isready; tcp probe + verifying the binary
      # responds on its admin console is enough for a depends_on gate.
      test: ["CMD-SHELL", "pgbouncer -V >/dev/null 2>&1 && (echo 'show version' | psql -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-app} -d pgbouncer -t >/dev/null 2>&1 || true)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ─── Prometheus (metrics scrape + alerting) ───────────────────────────────
  #
  # PROD-04. The Symfony API already exposes Prometheus-format metrics on
  # /api/metrics (frankenphp_worker_memory_bytes, db_query_duration_seconds
  # histogram). Prometheus scrapes through the edge Caddy → api routing,
  # evaluates the alert rules in alerts.yml, and pushes firing groups to
  # alertmanager below.
  #
  # The 256 MiB worker-memory ceiling lives in alerts.yml as
  # FrankenphpWorkerMemoryHigh — CLAUDE.md §3.10 calls this out as the
  # MUST-have monitoring before bulk operations ship to prod.
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ─── Alertmanager (routes Prometheus alerts to receivers) ─────────────────
  #
  # PROD-04. Minimal config that groups + dedupes alerts. ALERTMANAGER_WEBHOOK_URL
  # in env points at the operator's choice of receiver (PagerDuty / Slack /
  # Opsgenie / generic webhook). Default is example.invalid so an unconfigured
  # deploy fails loudly during smoke instead of silently swallowing alerts.
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    environment:
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-http://example.invalid/}
    volumes:
      - ./docker/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    expose:
      - "9093"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:9093/-/healthy"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

# Named volumes for monitoring state. Add to the prod overlay only — base
# compose stays free of monitoring infrastructure (devs use Symfony's web
# profiler instead of Prometheus locally).
volumes:
  prometheus_data:
  alertmanager_data:
